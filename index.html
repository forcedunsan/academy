const parseDate = (str) => {
  if (!str) return null;
  const [y, m, d] = str.split('-').map(Number);
  if (!y || !m || !d) return null;
  return new Date(y, m - 1, d);
};

const formatDateStr = (date) => {
  if (!date || isNaN(date)) return '';
  const y = date.getFullYear();
  const m = String(date.getMonth() + 1).padStart(2, '0');
  const d = String(date.getDate()).padStart(2, '0');
  return `${y}-${m}-${d}`;
};

const addDays = (d, n) => { const r = new Date(d); r.setDate(r.getDate() + n); return r; };

const fmtKDate = (d) => d ? `${String(d.getMonth() + 1).padStart(2, '0')}월 ${String(d.getDate()).padStart(2, '0')}일` : '';
const fmtKMonth = (d) => d ? `${String(d.getMonth() + 1).padStart(2, '0')}월` : '';
const fmtKYearMonth = (d) => d ? `${d.getFullYear()}년 ${String(d.getMonth() + 1).padStart(2, '0')}월` : '';

// 회차 계산 (휴일 제외)
const getClassSessions = (startDate, classDays, sessionsCount, holidaySet) => {
  if (!startDate || !classDays || classDays.length === 0) return [];
  const sessions = [];
  let current = new Date(startDate);
  let iter = 0;
  while (sessions.length < sessionsCount && iter < 365) {
    const dow = current.getDay();
    const dstr = formatDateStr(current);
    if (classDays.includes(dow) && !holidaySet.has(dstr)) {
      sessions.push({ date: new Date(current), sessionNum: sessions.length + 1 });
    }
    current = addDays(current, 1);
    iter++;
  }
  return sessions;
};

const getNextClassDay = (afterDate, classDays, holidaySet) => {
  if (!afterDate) return null;
  let current = addDays(afterDate, 1);
  let iter = 0;
  while (iter < 60) {
    const dow = current.getDay();
    const dstr = formatDateStr(current);
    if (classDays.includes(dow) && !holidaySet.has(dstr)) return current;
    current = addDays(current, 1);
    iter++;
  }
  return null;
};

// 지난 주기 역산: beforeDate 이전으로 거슬러 올라가 sessionsCount 회차 찾기
// (진행 캘린더 계산용)
const getPreviousCycleSessions = (beforeDate, classDays, sessionsCount, holidaySet) => {
  if (!beforeDate || !classDays || classDays.length === 0) return [];
  const sessions = [];
  let current = addDays(beforeDate, -1); // 기준일 하루 전부터
  let iter = 0;
  while (sessions.length < sessionsCount && iter < 365) {
    const dow = current.getDay();
    const dstr = formatDateStr(current);
    if (classDays.includes(dow) && !holidaySet.has(dstr)) {
      sessions.unshift({ date: new Date(current), sessionNum: 0 });
    }
    current = addDays(current, -1);
    iter++;
  }
  // 정순(과거→최근)으로 회차 번호 부여
  sessions.forEach((s, i) => { s.sessionNum = i + 1; });
  return sessions;
};

// 과목별 색상 자동 매칭
const getChipClass = (subjectName) => {
  if (!subjectName) return 'chip-default';
  if (subjectName.includes('영어')) return 'chip-english';
  if (subjectName.includes('수학')) return 'chip-math';
  if (subjectName.includes('국어')) return 'chip-korean';
  if (subjectName.includes('과학') || subjectName.includes('물리') || subjectName.includes('화학') || subjectName.includes('생물')) return 'chip-science';
  if (subjectName.includes('사회') || subjectName.includes('역사')) return 'chip-social';
  return 'chip-default';
};

// 특정 월의 달력 주 배열 생성
function buildMonthWeeks(year, month) {
  const firstDay = new Date(year, month - 1, 1);
  const lastDay = new Date(year, month, 0);
  const gridStart = new Date(firstDay);
  gridStart.setDate(firstDay.getDate() - firstDay.getDay());
  const gridEnd = new Date(lastDay);
  gridEnd.setDate(lastDay.getDate() + (6 - lastDay.getDay()));

  const weeks = [];
  let cur = new Date(gridStart);
  while (cur <= gridEnd) {
    const week = [];
    for (let i = 0; i < 7; i++) {
      week.push(new Date(cur));
      cur = addDays(cur, 1);
    }
    weeks.push(week);
  }
  return weeks;
}

// 수업 스케줄을 월-일자 키 맵으로 변환 (학생별 결석 포함)
function buildSessionMap(student, settings, mode) {
  const holidaySet = new Set((settings.holidays || []).map(h => h.date));
  const subjectData = [];
  const sessionMap = new Map();

  (student.subjects || []).forEach((sub, subIdx) => {
    if (!sub.startDate || !sub.classDays || sub.classDays.length === 0) {
      subjectData.push({ ...sub, index: subIdx, sessions: [], startDate: null, endDate: null });
      return;
    }

    // 입력된 startDate = 이번 청구 주기(계획)의 시작일
    const newCycleStart = parseDate(sub.startDate);
    let sessions = [];
    let cycleStart = null, cycleEnd = null;

    if (mode === 'plan') {
      // 계획 = 이번 청구 주기 (입력된 시작일부터 정방향)
      sessions = getClassSessions(newCycleStart, sub.classDays, sub.totalSessions, holidaySet);
      if (sessions.length > 0) {
        cycleStart = sessions[0].date;
        cycleEnd = sessions[sessions.length - 1].date;
      }
    } else {
      // 진행 = 지난 주기 (신규 등록이면 비움, 아니면 역산)
      if (sub.isNew) {
        subjectData.push({ ...sub, index: subIdx, sessions: [], startDate: null, endDate: null, isNew: true });
        return;
      }
      sessions = getPreviousCycleSessions(newCycleStart, sub.classDays, sub.totalSessions, holidaySet);
      if (sessions.length > 0) {
        cycleStart = sessions[0].date;
        cycleEnd = sessions[sessions.length - 1].date;
      }
    }

    if (sessions.length === 0) {
      subjectData.push({ ...sub, index: subIdx, sessions: [], startDate: null, endDate: null });
      return;
    }

    // 학생별 결석 정보 (과목별로 필터)
    const absencesForSubject = (student.absences || []).filter(a => a.subjectId === sub.id);
    const absentDateSet = new Set(absencesForSubject.map(a => a.date));

    sessions.forEach(s => {
      const key = formatDateStr(s.date);
      if (!sessionMap.has(key)) sessionMap.set(key, []);
      sessionMap.get(key).push({
        subjectIndex: subIdx,
        subjectName: sub.name,
        sessionNum: s.sessionNum,
        absent: absentDateSet.has(key),
      });
    });

    subjectData.push({
      ...sub,
      index: subIdx,
      sessions,
      startDate: cycleStart,
      endDate: cycleEnd,
      absentCount: absencesForSubject.filter(a => {
        const d = parseDate(a.date);
        return d && d >= cycleStart && d <= cycleEnd;
      }).length,
    });
  });

  return { sessionMap, subjectData };
}

// 달력 표시 범위 결정: 전체 수업이 포함된 달들
function determineCalendarMonths(subjectData) {
  const allDates = [];
  subjectData.forEach(sd => {
    if (sd.startDate) allDates.push(sd.startDate);
    if (sd.endDate) allDates.push(sd.endDate);
  });
  if (allDates.length === 0) return [];
  const earliest = new Date(Math.min(...allDates.map(d => d.getTime())));
  const latest = new Date(Math.max(...allDates.map(d => d.getTime())));
  const months = [];
  const cur = new Date(earliest.getFullYear(), earliest.getMonth(), 1);
  while (cur <= latest) {
    months.push({ year: cur.getFullYear(), month: cur.getMonth() + 1 });
    cur.setMonth(cur.getMonth() + 1);
  }
  return months;
}

function CalendarView({ student, settings, mode, calendarRef }) {

  const { sessionMap, subjectData } = buildSessionMap(student, settings, mode);

    return (
      <div style={{ width: '600px', padding: '40px', background: '#f9fafb', textAlign: 'center', color: '#6b7280', border: '2px solid #e5e7eb', borderRadius: '8px' }}>
        일정을 계산할 수 없습니다.
      </div>
    );
  }

  const months = determineCalendarMonths(validSubjects);
  const holidayMap = new Map((settings.holidays || []).map(h => [h.date, h.label]));

  // 색상 정보 (설정에서 지정한 과목별 색상 사용)
  const subjectColors = validSubjects.map((s) => ({ ...s, color: resolveSubjectColor(s.name, settings) }));

  // 기간 표시
  const earliestStart = new Date(Math.min(...validSubjects.map(s => s.startDate.getTime())));
  const latestEnd = new Date(Math.max(...validSubjects.map(s => s.endDate.getTime())));

  // 익월 등록 마감일 (계획용)
  const holidaySet = new Set((settings.holidays || []).map(h => h.date));
  const nextNextStarts = validSubjects.map(s => {
    const next = getNextClassDay(s.endDate, s.classDays, holidaySet);
    return next;
  }).filter(Boolean);
  const earliestNextStart = nextNextStarts.length > 0 ? new Date(Math.min(...nextNextStarts.map(d => d.getTime()))) : null;
  const registrationDeadline = earliestNextStart ? addDays(earliestNextStart, -1) : null;

  const titleBg = mode === 'current' ? '#1a2344' : '#3a1a34';
  const titleText = mode === 'current' ? '학습 진행 일정' : '학습 계획 일정';
  const modeLabel = mode === 'current' ? '진행' : '계획';

  return (
    <div ref={calendarRef} style={{
      width: '600px',
      maxWidth: '600px',
      boxSizing: 'border-box',
      overflow: 'hidden',
      background: 'white',
      fontFamily: "'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, 'Malgun Gothic', sans-serif"
    }}>
      {/* 타이틀 */}
      <div style={{ background: titleBg, color: 'white', padding: '14px 16px', textAlign: 'center' }}>
        <div style={{ fontSize: '10px', letterSpacing: '0.2em', color: '#c9a76e', fontWeight: 600, marginBottom: '4px' }}>
          {settings.academyNameEn}
        </div>
        <div style={{ fontSize: '16px', fontWeight: 'bold' }}>
          {student.name} 학생 · {modeLabel} 일정
        </div>
        <div style={{ fontSize: '12px', opacity: 0.85, marginTop: '2px' }}>
          {earliestStart.getFullYear()}년 {String(earliestStart.getMonth() + 1).padStart(2, '0')}월 {String(earliestStart.getDate()).padStart(2, '0')}일 ~ {String(latestEnd.getMonth() + 1).padStart(2, '0')}월 {String(latestEnd.getDate()).padStart(2, '0')}일
        </div>
      </div>

      {/* 과목 범례 */}
      <div style={{ padding: '10px 16px', background: '#f9fafb', borderBottom: '1px solid #e5e7eb', display: 'flex', gap: '12px', flexWrap: 'wrap', justifyContent: 'center' }}>
        {subjectColors.map((s) => (
          <div key={s.index} style={{ display: 'flex', alignItems: 'center', gap: '5px', fontSize: '12px' }}>
            <span style={{ width: '10px', height: '10px', background: s.color.badge, borderRadius: '50%', display: 'inline-block' }}></span>
            <span style={{ fontWeight: 600, color: '#374151' }}>{s.name}</span>
            <span style={{ color: '#6b7280', fontSize: '10px' }}>
              (주 {s.classDays.length}회 · {s.sessions.length}회차)
            </span>
          </div>
        ))}
      </div>

      {/* 월별 캘린더 */}
      {months.map(({ year, month }) => {
        const weeks = buildMonthWeeks(year, month);
        return (
          <div key={`${year}-${month}`} style={{ padding: '12px 16px', borderBottom: '1px solid #e5e7eb' }}>
            <div style={{ fontSize: '13px', fontWeight: 700, color: '#1a2344', marginBottom: '6px', textAlign: 'center' }}>
              {year}년 {String(month).padStart(2, '0')}월
            </div>
            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(7, 1fr)', border: '1px solid #d1d5db', background: '#d1d5db', gap: '1px' }}>
              {DAY_NAMES_KO.map((day, i) => (
                <div key={i} style={{ background: '#f3f4f6', padding: '4px', textAlign: 'center', fontSize: '11px', fontWeight: 600, color: i === 0 ? '#dc2626' : i === 6 ? '#2563eb' : '#374151' }}>
                  {day}
                </div>
              ))}
              {weeks.flat().map((date, idx) => {
                const dstr = formatDateStr(date);
                const isCurrentMonth = date.getMonth() === month - 1;
                const holiday = holidayMap.get(dstr);
                const sessions = sessionMap.get(dstr) || [];
                const dow = date.getDay();
                const hasClass = sessions.length > 0;

                let bg = 'white';
                if (!isCurrentMonth) bg = '#f9fafb';
                else if (holiday) bg = '#FEE2E2';
                else if (hasClass) {
                  // 과목이 여러 개면 그라디언트, 하나면 단색
                  const colors = sessions.map(s => subjectColors.find(sc => sc.index === s.subjectIndex)?.color?.bg).filter(Boolean);
                  if (colors.length === 1) bg = colors[0];
                  else if (colors.length > 1) {
                    const stops = colors.map((c, i) => `${c} ${(i / colors.length) * 100}% ${((i + 1) / colors.length) * 100}%`).join(', ');
                    bg = `linear-gradient(135deg, ${stops})`;
                  }
                }

                const dateColor = !isCurrentMonth ? '#9ca3af' : holiday ? '#dc2626' : dow === 0 ? '#dc2626' : '#111827';

                return (
                  <div key={idx} style={{
                    background: bg,
                    minHeight: '60px',
                    padding: '4px 3px',
                    fontSize: '10px',
                    opacity: isCurrentMonth ? 1 : 0.5,
                    position: 'relative',
                    display: 'flex',
                    flexDirection: 'column',
                    alignItems: 'center',
                    textAlign: 'center',
                  }}>
                    <div style={{ fontSize: '11px', fontWeight: holiday ? 700 : 500, color: dateColor, lineHeight: 1 }}>
                      {date.getDate()}
                    </div>
                    {holiday && isCurrentMonth && (
                      <div style={{ fontSize: '9px', color: '#dc2626', fontWeight: 700, marginTop: '2px', lineHeight: 1.1, textAlign: 'center' }}>
                        {holiday}
                      </div>
                    )}
                    {isCurrentMonth && !holiday && sessions.map((s, si) => {
                      const color = subjectColors.find(sc => sc.index === s.subjectIndex)?.color;
                      if (!color) return null;
                      return (
                        <div key={si} style={{
                          fontSize: '10px',
                          color: s.absent ? '#dc2626' : color.badge,
                          fontWeight: 800,
                          lineHeight: 1.2,
                          marginTop: '2px',
                          textDecoration: s.absent ? 'line-through' : 'none',
                          textShadow: '0 0 1px rgba(255,255,255,0.5)',
                          letterSpacing: '-0.02em',
                          textAlign: 'center',
                        }}>
                          {s.subjectName}{s.sessionNum}
                          {s.absent && <span style={{ marginLeft: '2px', color: '#dc2626', textDecoration: 'none' }}>결</span>}
                        </div>
                      );
                    })}
                  </div>
                );
              })}
            </div>
          </div>
        );
      })}

      {/* 과목별 요약 */}
      <div style={{ padding: '12px 16px', background: '#f9fafb', borderTop: '2px solid #1a2344' }}>
        <div style={{ fontSize: '12px', fontWeight: 700, color: '#1a2344', marginBottom: '6px' }}>📊 과목별 요약</div>
        {subjectColors.map((s) => (
          <div key={s.index} style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', fontSize: '11px', padding: '4px 8px', background: 'white', borderLeft: `4px solid ${s.color.badge}`, marginBottom: '3px' }}>
            <div>
              <span style={{ fontWeight: 800, color: s.color.badge, marginRight: '8px' }}>{s.name}</span>
              <span style={{ color: '#6b7280' }}>
                {fmtKDate(s.startDate)} ~ {fmtKDate(s.endDate)}
              </span>
            </div>
            <div style={{ fontWeight: 600, color: '#1a2344' }}>
              총 {s.sessions.length}회차
              {mode === 'current' && s.absentCount > 0 && (
                <span style={{ color: '#dc2626', marginLeft: '6px' }}>(결석 {s.absentCount}회)</span>
              )}
              · 주 {s.classDays.length}회
            </div>
          </div>
        ))}
      </div>

      {/* 계획 모드일 때 등록 마감 경고 박스 */}
      {mode === 'plan' && registrationDeadline && (
        <div style={{ padding: '14px 16px', background: 'white' }}>
          <div style={{ border: '3px solid #dc2626', borderRadius: '8px', padding: '12px', background: '#FEF2F2' }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: '8px', marginBottom: '6px' }}>
              <span style={{ fontSize: '18px' }}>⚠️</span>
              <span style={{ fontSize: '13px', fontWeight: 800, color: '#991B1B' }}>
                익월 등록 · 퇴원 고지 안내
              </span>
            </div>
            <div style={{ fontSize: '11px', color: '#7f1d1d', lineHeight: 1.6, fontWeight: 600 }}>
              <div style={{ marginBottom: '4px' }}>
                📅 익월 등록 마감일: <span style={{ fontSize: '14px', fontWeight: 800 }}>{fmtKDate(registrationDeadline)}까지</span>
              </div>
              <div style={{ fontSize: '10.5px', fontWeight: 500, color: '#7f1d1d', marginTop: '6px' }}>
                위 날짜까지 퇴원 의사를 전달해주셔야 온라인 수업 프로그램 결제 취소, 교재 제작 중단 등이 가능합니다.
                고지 없이 미납 시 <strong>교재·온라인 비용이 이미 집행</strong>되어 환불이 어려우며,
                원활한 학원 운영을 위해 반드시 사전 안내 부탁드립니다. 🙏
              </div>
            </div>
          </div>
        </div>
      )}

      {/* 진행 모드일 때 간단 푸터 */}
      {mode === 'current' && (
        <div style={{ padding: '10px 16px', background: '#f3f4f6', fontSize: '10px', color: '#6b7280', textAlign: 'center' }}>
          * 결석(결) 표시는 수업일이지만 결석 처리된 회차입니다
        </div>
      )}
    </div>
  );
}

// ═══════════════════════════════════════════════════
//  4. 안내문 렌더링 (템플릿 정확히 재현)
// ═══════════════════════════════════════════════════

function InvoiceView({ student, settings, invoiceRef }) {
  if (!student) return null;

  // 기간 표시 자동 계산 (시작월 ~ 종료월)
  const periodLabel = (() => {
    if (student.periodDisplay) return student.periodDisplay;
    if (!student.subjects || student.subjects.length === 0) return '';
    const dates = student.subjects.map(s => parseDate(s.startDate)).filter(Boolean);
    if (dates.length === 0) return '';
    const earliest = new Date(Math.min(...dates.map(d => d.getTime())));
    // 각 과목의 종료일 중 가장 나중 것
    const holidaySet = new Set((settings.holidays || []).map(h => h.date));
    const endDates = student.subjects.map(s => {
      const sessions = getClassSessions(parseDate(s.startDate), s.classDays, s.totalSessions, holidaySet);
      return sessions.length > 0 ? sessions[sessions.length - 1].date : null;
    }).filter(Boolean);
    if (endDates.length === 0) return fmtKYearMonth(earliest);
    const latest = new Date(Math.max(...endDates.map(d => d.getTime())));
    if (earliest.getFullYear() === latest.getFullYear() && earliest.getMonth() === latest.getMonth()) {
      return `${earliest.getFullYear()}년 ${String(earliest.getMonth() + 1).padStart(2, '0')}월`;
    }
    return `${earliest.getFullYear()}년 ${String(earliest.getMonth() + 1).padStart(2, '0')}월 ~ ${String(latest.getMonth() + 1).padStart(2, '0')}월`;
  })();

  const tuitionTotal = (student.subjects || []).reduce((s, x) => s + (x.tuition || 0), 0);
  const materialTotal = (student.materials || []).reduce((s, x) => s + (x.amount || 0), 0);

  const greeting1 = settings.greetingLine1.replace('{학원명}', settings.academyName);

  return (
    <div ref={invoiceRef} className="invoice-navy" style={{ width: '560px', color: 'white' }}>
      {/* 헤더 */}
      <div className="wave-bg px-8 pt-10 pb-14 text-center relative">
        <div className="invoice-gold-text text-[11px] tracking-[0.25em] font-semibold mb-3">
          {settings.academyNameEn}
        </div>
        <h1 className="text-white text-xl font-bold leading-relaxed">
          {settings.headerTitle1}
        </h1>
        <h1 className="text-white text-xl font-bold leading-relaxed">
          <span className="invoice-gold-text">수강료 선납</span>
          {settings.headerTitle2.replace('수강료 선납', '')}
        </h1>
        <div className="invoice-gold inline-block mt-3" style={{ width: '36px', height: '3px', borderRadius: '2px' }}></div>
      </div>

      {/* 인사말 + 학생 정보 */}
      <div className="bg-white mx-5 -mt-6 rounded-lg p-5 text-gray-800 shadow-lg relative z-10">
        <p className="text-sm leading-relaxed">{greeting1}</p>
        <p className="text-sm leading-relaxed">{settings.greetingLine2}</p>
        <p className="text-sm leading-relaxed mb-4">{settings.greetingLine3}</p>
        <div className="flex items-center gap-3 flex-wrap">
          <div
            className="invoice-navy text-white rounded-full text-sm font-semibold"
            style={{
              display: 'inline-flex',
              alignItems: 'center',
              gap: '6px',
              padding: '6px 18px',
              lineHeight: 1.4,
            }}
          >
            <span className="invoice-gold-text">✦</span>
            <span>{student.name} 학생</span>
          </div>
          {(student.schoolName || student.grade) && (
            <div
              className="text-gray-700 text-xs font-medium bg-gray-100 rounded-full"
              style={{
                display: 'inline-flex',
                alignItems: 'center',
                padding: '5px 12px',
                lineHeight: 1.4,
              }}
            >
              {student.schoolName}{student.schoolName && student.grade ? ' · ' : ''}{student.grade}
            </div>
          )}
          {periodLabel && (
            <div className="text-gray-600 text-xs flex items-center gap-1">
              <span>📅</span>
              <span>{periodLabel}</span>
            </div>
          )}
        </div>
      </div>

      {/* 수업 일정 */}
      <div className="bg-white mx-5 mt-4 rounded-lg p-5 text-gray-800">
        <div className="flex items-center gap-2 mb-3">
          <span className="text-base">📊</span>
          <h2 className="font-semibold text-gray-800">수업 일정</h2>
        </div>
        <div className="border-t border-gray-200 mb-3"></div>
        <div className="space-y-2">
          {(student.subjects || []).map((sub) => (
            <div key={sub.id} className="flex items-center gap-3 py-1.5 px-2 rounded" style={{ background: '#f7f5f0' }}>
              <span
                className={`${getChipClass(sub.name)} text-xs font-semibold rounded-full min-w-[48px]`}
                style={{
                  display: 'inline-flex',
                  alignItems: 'center',
                  justifyContent: 'center',
                  padding: '4px 12px',
                  lineHeight: 1.4,
                }}
              >
                {sub.name}
              </span>
              <span className="text-sm text-gray-700 flex-1">
                시작 <span className="font-bold">{fmtKDate(parseDate(sub.startDate))}</span> 1회차
              </span>
              <span className="text-xs text-gray-500 font-medium">주 {sub.sessionsPerWeek}회</span>
            </div>
          ))}
        </div>
      </div>

      {/* 교습비 안내 */}
      <div className="invoice-navy-2 mx-5 mt-4 rounded-lg p-5">
        <div className="flex items-center gap-2 mb-3">
          <span>💰</span>
          <h2 className="font-semibold text-white">교습비 안내</h2>
        </div>
        <div className="border-t border-white/20 mb-3"></div>
        <div className="space-y-2">
          {(student.subjects || []).map((sub) => (
            <div key={sub.id} className="flex justify-between items-center py-1">
              <span className="text-sm">
                <span className="font-medium text-white">{sub.label || sub.name}</span>
                {sub.labelNote && <span className="text-xs text-white/60 ml-2">{sub.labelNote}</span>}
              </span>
              <span className="text-white font-bold text-sm">{fmtWon(sub.tuition)}</span>
            </div>
          ))}
        </div>
        <div
          className="invoice-gold mt-3 rounded"
          style={{
            display: 'flex',
            justifyContent: 'space-between',
            alignItems: 'center',
            padding: '14px 18px',
            lineHeight: 1.2,
          }}
        >
          <span className="font-bold text-sm" style={{ lineHeight: 1 }}>교습비 합계</span>
          <span className="font-bold text-base" style={{ lineHeight: 1 }}>{fmtWon(tuitionTotal)}</span>
        </div>
      </div>

      {/* 교재비 */}
      {(student.materials || []).length > 0 && (
        <div className="invoice-navy-2 mx-5 mt-4 rounded-lg p-5">
          <div className="flex items-center gap-2 mb-3">
            <span>📚</span>
            <h2 className="font-semibold text-white">교재비 · 컨텐츠비</h2>
          </div>
          <div className="border-t border-white/20 mb-3"></div>
          <div className="space-y-2">
            {(student.materials || []).map((m) => (
              <div key={m.id} className="flex justify-between items-center py-1">
                <span className="text-sm">
                  <span className="font-medium text-white">{m.label}</span>
                  {m.note && <span className="text-xs text-white/60 ml-2">{m.note}</span>}
                </span>
                <span className="text-white font-bold text-sm">{fmtWon(m.amount)}</span>
              </div>
            ))}
          </div>
          <div
            className="invoice-gold mt-3 rounded"
            style={{
              display: 'flex',
              justifyContent: 'space-between',
              alignItems: 'center',
              padding: '14px 18px',
              lineHeight: 1.2,
            }}
          >
            <span className="font-bold text-sm" style={{ lineHeight: 1 }}>교재비 합계</span>
            <span className="font-bold text-base" style={{ lineHeight: 1 }}>{fmtWon(materialTotal)}</span>
          </div>
          {settings.contentsLabel && (
            <div className="text-[11px] text-white/50 mt-3 pt-3 border-t border-white/10">
              <span className="text-white/70 font-medium">{settings.contentsLabel}</span>
            </div>
          )}
        </div>
      )}

      {/* 교습비 결제 방법 */}
      <div className="bg-white mx-5 mt-4 rounded-lg p-5 text-gray-800">
        <div className="flex items-center gap-2 mb-4">
          <span>💳</span>
          <h2 className="font-semibold">교습비 결제 방법</h2>
        </div>
        <div className="bg-gray-50 rounded-lg p-4 mb-3">
          <div className="font-semibold text-sm mb-2 flex items-center gap-1.5">
            <span>💳</span><span>카드 결제</span>
          </div>
          <ul className="space-y-1 text-xs text-gray-600">
            {settings.tuitionCardItems.map((item, i) => (
              <li key={i} className="flex gap-2"><span>•</span><span>{item}</span></li>
            ))}
          </ul>
        </div>
        <div className="bg-gray-50 rounded-lg p-4">
          <div className="font-semibold text-sm mb-2 flex items-center gap-1.5">
            <span>🏦</span><span>현금 이체</span>
          </div>
          <ul className="space-y-1 text-xs text-gray-600 mb-3">
            {settings.tuitionCashItems.map((item, i) => (
              <li key={i} className="flex gap-2"><span>•</span><span>{item}</span></li>
            ))}
          </ul>
          <div className="invoice-navy rounded-md p-3 text-white">
            <div className="invoice-gold-text text-[10px] font-bold tracking-wider mb-1">{settings.tuitionBankName}</div>
            <div className="text-base font-bold tracking-wide">{settings.tuitionBankAccount}</div>
            <div className="text-[11px] text-white/70 mt-0.5">예금주: {settings.tuitionBankHolder}</div>
          </div>
        </div>
      </div>

      {/* 교재비 결제 방법 */}
      <div className="bg-white mx-5 mt-4 mb-4 rounded-lg p-5 text-gray-800">
        <div className="flex items-center justify-between mb-3">
          <div className="flex items-center gap-2">
            <span>📚</span>
            <h2 className="font-semibold">교재비 결제 방법</h2>
          </div>
          <span className="text-[10px] text-gray-400">{settings.materialVendor}</span>
        </div>
        <ul className="space-y-1.5 text-xs text-gray-700 pl-1">
          {settings.materialMethods.map((m, i) => {
            const emoji = m.includes('카드') ? '💳' : m.includes('가상') ? '🏦' : '•';
            return (
              <li key={i} className="flex gap-2 items-center">
                <span>•</span>
                <span>{emoji}</span>
                <span>{m}</span>
              </li>
            );
          })}
        </ul>
      </div>

      {/* 푸터 */}
      <div className="wave-bg px-6 py-6 text-center">
        <div className="invoice-gold inline-block mb-4" style={{ width: '36px', height: '2px' }}></div>
        <p className="text-white text-sm mb-1">{settings.footerLine1}</p>
        <p className="text-white text-sm font-semibold mb-4">{settings.footerLine2}</p>
        <div className="flex justify-center gap-3 mb-4">
          <div className="invoice-navy-2 rounded px-3 py-2 flex-1 max-w-[150px]">
            <div className="invoice-gold-text text-[10px] font-semibold mb-0.5">학원 대표</div>
            <div className="text-white text-xs font-bold">{settings.academyPhone}</div>
          </div>
          <div className="invoice-navy-2 rounded px-3 py-2 flex-1 max-w-[150px]">
            <div className="invoice-gold-text text-[10px] font-semibold mb-0.5">원장 직통</div>
            <div className="text-white text-xs font-bold">{settings.directorPhone}</div>
          </div>
        </div>
        <div className="invoice-gold-text text-[10px] tracking-[0.25em] font-semibold">
          {settings.academyNameEn}
        </div>

}

function SchedulePreview({ subject, holidays }) {
  const [expanded, setExpanded] = useState(false);
  if (!subject.startDate || !subject.classDays || subject.classDays.length === 0 || !subject.totalSessions) {
    return null;
  }
  const holidaySet = new Set((holidays || []).map(h => h.date));

  // 계획 주기 (이번 청구): 입력한 시작일부터 정방향
  const planSessions = getClassSessions(parseDate(subject.startDate), subject.classDays, subject.totalSessions, holidaySet);
  const planStart = planSessions.length > 0 ? planSessions[0].date : null;
  const planEnd = planSessions.length > 0 ? planSessions[planSessions.length - 1].date : null;
  const planComplete = planSessions.length === subject.totalSessions;

  // 다음 주기 (등록 마감일 계산용)
  const nextNextStart = planEnd ? getNextClassDay(planEnd, subject.classDays, holidaySet) : null;

  // 진행 주기 (지난 주기): 신규 등록이 아니면 역산
  const currentSessions = subject.isNew
    ? []
    : getPreviousCycleSessions(parseDate(subject.startDate), subject.classDays, subject.totalSessions, holidaySet);
  const currentStart = currentSessions.length > 0 ? currentSessions[0].date : null;
  const currentEnd = currentSessions.length > 0 ? currentSessions[currentSessions.length - 1].date : null;

  return (
    <div className="mt-3 p-3 bg-blue-50 border border-blue-200 rounded text-xs">
      <div className="flex items-center justify-between gap-2 mb-2">
        <span className="text-gray-700 font-semibold">📅 자동 계산 결과</span>
        <button
          onClick={() => setExpanded(!expanded)}
          className="text-blue-600 hover:underline"
        >
          {expanded ? '회차 목록 숨기기 ▲' : '회차 목록 보기 ▼'}
        </button>
      </div>

      {/* 진행 캘린더 (지난 주기) */}
      <div className="mb-2 p-2 bg-amber-50 border border-amber-200 rounded">
        <div className="flex items-center gap-2 mb-0.5">
          <span className="font-bold text-amber-700">📅 진행 캘린더 (지난 주기)</span>
          {subject.isNew && (
            <span className="text-amber-600 bg-amber-100 px-1.5 py-0.5 rounded text-[10px]">
              🆕 신규 등록 → 진행 캘린더 생성 안 됨
            </span>
          )}
        </div>
        {!subject.isNew && currentStart && (
          <div className="text-amber-900">
            <span className="font-bold">{fmtKDate(currentStart)}</span>
            <span className="mx-1 text-amber-500">~</span>
            <span className="font-bold">{fmtKDate(currentEnd)}</span>
            <span className="ml-2 text-amber-700">({currentSessions.length}회차)</span>
          </div>
        )}
      </div>

      {/* 계획 캘린더 (이번 청구) */}
      <div className="mb-2 p-2 bg-rose-50 border border-rose-200 rounded">
        <div className="flex items-center gap-2 mb-0.5">
          <span className="font-bold text-rose-700">📆 계획 캘린더 (이번 청구 대상)</span>
          <span className="text-[10px] text-rose-600 bg-rose-100 px-1.5 py-0.5 rounded font-semibold">
            💰 수강료 청구 주기
          </span>
        </div>
        {planStart && (
          <>
            <div className="text-rose-900">
              <span className="font-bold">{fmtKDate(planStart)}</span>
              <span className="mx-1 text-rose-500">~</span>
              <span className="font-bold">{fmtKDate(planEnd)}</span>
              <span className="ml-2 text-rose-700">(총 {planSessions.length}회차 · 주 {subject.classDays.length}회)</span>
              {!planComplete && (
                <span className="ml-2 text-orange-600 font-semibold">
                  ⚠️ {subject.totalSessions}회 중 {planSessions.length}회만 계산됨
                </span>
              )}
            </div>
            {nextNextStart && (
              <div className="text-rose-700 mt-0.5">
                🔜 익월 등록 주기 시작: <span className="font-semibold">{fmtKDate(nextNextStart)}</span>
              </div>
            )}
          </>
        )}
      </div>

      {/* 회차 목록 */}
      {expanded && (
        <>
          {!subject.isNew && currentSessions.length > 0 && (
            <div className="mb-2">
              <div className="text-[10px] text-amber-700 font-semibold mb-1">진행 캘린더 회차:</div>
              <div className="grid grid-cols-3 md:grid-cols-4 gap-1">
                {currentSessions.map((s) => (
                  <div key={s.sessionNum} className="bg-amber-100 border border-amber-200 rounded px-1.5 py-0.5 text-[11px]">
                    <span className="text-amber-600">{s.sessionNum}회차</span>
                    <span className="ml-1 font-semibold text-amber-900">
                      {String(s.date.getMonth() + 1).padStart(2, '0')}/{String(s.date.getDate()).padStart(2, '0')}
                    </span>
                    <span className="ml-0.5 text-amber-500 text-[10px]">({DAY_NAMES_KO[s.date.getDay()]})</span>
                  </div>
                ))}
              </div>
            </div>
          )}
          {planSessions.length > 0 && (
            <div>
              <div className="text-[10px] text-rose-700 font-semibold mb-1">계획 캘린더 회차:</div>
              <div className="grid grid-cols-3 md:grid-cols-4 gap-1">
                {planSessions.map((s) => (
                  <div key={s.sessionNum} className="bg-rose-100 border border-rose-200 rounded px-1.5 py-0.5 text-[11px]">
                    <span className="text-rose-600">{s.sessionNum}회차</span>
                    <span className="ml-1 font-semibold text-rose-900">
                      {String(s.date.getMonth() + 1).padStart(2, '0')}/{String(s.date.getDate()).padStart(2, '0')}
                    </span>
                    <span className="ml-0.5 text-rose-500 text-[10px]">({DAY_NAMES_KO[s.date.getDay()]})</span>
                  </div>
                ))}
              </div>
            </div>
          )}
        </>
      )}
    </div>
  );
}

function HolidaysManager({ holidays, onChange }) {
  const [startDate, setStartDate] = useState('');
  const [endDate, setEndDate] = useState('');
  const [label, setLabel] = useState('');

  const add = () => {
    if (!startDate) return;
    const start = parseDate(startDate);
    const end = endDate ? parseDate(endDate) : start;
    if (!start || !end || end < start) return;
    const existing = new Set(holidays.map(h => h.date));
    const toAdd = [];
    let cur = new Date(start);
    while (cur <= end) {
      const dstr = formatDateStr(cur);
      if (!existing.has(dstr)) toAdd.push({ date: dstr, label: label || '휴일' });
      cur = addDays(cur, 1);
    }
    const updated = [...holidays, ...toAdd].sort((a, b) => a.date.localeCompare(b.date));
    onChange(updated);
    setStartDate('');
    setEndDate('');
    setLabel('');
  };

  const remove = (i) => onChange(holidays.filter((_, idx) => idx !== i));

  return (
    <div>
      <div className="flex gap-2 items-end flex-wrap mb-2">
        <div className="flex-1 min-w-[120px]">
          <label className="block text-[11px] text-gray-600 mb-0.5">시작일</label>
          <input type="date" value={startDate} onChange={(e) => setStartDate(e.target.value)} className="input" />
        </div>
        <span className="text-gray-400 pb-2">~</span>
        <div className="flex-1 min-w-[120px]">
          <label className="block text-[11px] text-gray-600 mb-0.5">끝일 (선택)</label>
          <input type="date" value={endDate} onChange={(e) => setEndDate(e.target.value)} className="input" />
        </div>
        <div className="flex-1 min-w-[100px]">
          <label className="block text-[11px] text-gray-600 mb-0.5">라벨</label>
          <input type="text" value={label} onChange={(e) => setLabel(e.target.value)} onKeyDown={(e) => e.key === 'Enter' && add()} className="input" placeholder="예: 설, 추석, 휴원" />
        </div>
        <button onClick={add} className="px-4 py-1.5 bg-green-600 text-white rounded text-sm font-semibold">+ 추가</button>
      </div>
      {holidays.length > 0 ? (
        <div className="flex flex-wrap gap-1 max-h-40 overflow-y-auto p-2 bg-gray-50 border rounded">
          {holidays.map((h, i) => (
            <span key={i} className="inline-flex items-center gap-1 bg-red-50 border border-red-200 rounded px-2 py-0.5 text-xs">
              <span className="text-gray-700 font-medium">{h.date}</span>
              <span className="text-red-600 font-semibold">{h.label}</span>
              <button onClick={() => remove(i)} className="text-red-400 hover:text-red-700 ml-0.5 text-base leading-none">×</button>
            </span>
          ))}
        </div>
      ) : (
        <div className="text-xs text-gray-400 italic">등록된 휴일 없음</div>
      )}
      <p className="text-[11px] text-gray-500 mt-2 leading-relaxed">
        💡 여기 등록한 날짜는 <strong>모든 학생의 회차 계산에서 자동 제외</strong>됩니다.<br/>
        공휴일(설·추석·어린이날 등), 학원 전체 휴원일 등록에 사용하세요.<br/>
        개별 학생 결석은 학생 편집에서 별도로 처리하면 됩니다.
      </p>
    </div>
  );
}

function SubjectColorsManager({ subjectColors, onChange, students }) {
  const [newName, setNewName] = useState('');

  // 등록된 과목 목록 + 학생 데이터에 있지만 등록 안 된 과목 자동 감지
  const usedSubjectNames = new Set();
  (students || []).forEach(s => (s.subjects || []).forEach(sub => {
    if (sub.name) usedSubjectNames.add(sub.name);
  }));
  const unregistered = Array.from(usedSubjectNames).filter(n => !subjectColors[n]);

  const add = () => {
    if (!newName.trim()) return;
    if (subjectColors[newName]) { alert('이미 등록된 과목명입니다'); return; }
    onChange({ ...subjectColors, [newName]: COLOR_PRESETS[0] });
    setNewName('');
  };

  const remove = (name) => {
    const { [name]: _, ...rest } = subjectColors;
    onChange(rest);
  };

  const updateColor = (name, preset) => {
    onChange({ ...subjectColors, [name]: preset });
  };

  const rename = (oldName, newName) => {
    if (!newName.trim() || oldName === newName) return;
    if (subjectColors[newName]) { alert('이미 등록된 과목명입니다'); return; }
    const entries = Object.entries(subjectColors);
    const newColors = {};
    for (const [k, v] of entries) {
      newColors[k === oldName ? newName : k] = v;
    }
    onChange(newColors);
  };

  return (
    <div>
      {/* 등록된 과목 목록 */}
      <div className="space-y-2 mb-3">
        {Object.entries(subjectColors).map(([name, color]) => (
          <SubjectColorRow
            key={name}
            name={name}
            color={color}
            onRename={(newName) => rename(name, newName)}
            onColorChange={(preset) => updateColor(name, preset)}
            onRemove={() => remove(name)}
          />
        ))}
        {Object.keys(subjectColors).length === 0 && (
          <div className="text-xs text-gray-400 italic p-3 text-center border border-dashed rounded">
            등록된 과목이 없습니다
          </div>
        )}
      </div>

      {/* 새 과목 추가 */}
      <div className="flex gap-2 items-center mb-2">
        <input
          type="text"
          value={newName}
          onChange={(e) => setNewName(e.target.value)}
          onKeyDown={(e) => e.key === 'Enter' && add()}
          placeholder="새 과목명 (예: 영어, 고등 수학, 내신 국어)"
          className="flex-1 px-2 py-1.5 border rounded text-sm"
        />
        <button onClick={add} className="px-3 py-1.5 bg-blue-600 text-white rounded text-sm font-semibold">+ 과목 추가</button>
      </div>

      {/* 학생 데이터엔 있지만 미등록인 과목 감지 */}
      {unregistered.length > 0 && (
        <div className="mt-3 p-2 bg-amber-50 border border-amber-300 rounded text-xs">
          <div className="font-semibold text-amber-800 mb-1">⚠️ 학생 등록 과목 중 색상 미지정:</div>
          <div className="flex flex-wrap gap-1">
            {unregistered.map(name => (
              <button
                key={name}
                onClick={() => onChange({ ...subjectColors, [name]: COLOR_PRESETS[Math.floor(Math.random() * COLOR_PRESETS.length)] })}
                className="px-2 py-0.5 bg-white border border-amber-400 rounded text-amber-800 hover:bg-amber-100"
              >
                + {name}
              </button>
            ))}
          </div>
          <div className="text-amber-700 mt-1">클릭하면 임의 색으로 바로 추가됩니다</div>
        </div>
      )}

      <p className="text-[11px] text-gray-500 mt-3 leading-relaxed">
        💡 등록한 과목명과 <strong>일치하거나 포함된 이름</strong>을 자동으로 매칭합니다.<br/>
        예) "영어"를 등록하면 학생 과목 "고등 영어", "중등 영어" 모두 이 색으로 표시됩니다.
      </p>
    </div>
  );
}

function SubjectColorRow({ name, color, onRename, onColorChange, onRemove }) {
  const [editing, setEditing] = useState(false);
  const [editName, setEditName] = useState(name);

  return (
    <div className="flex items-center gap-2 p-2 border rounded bg-gray-50">
      {/* 미리보기 */}
      <div
        style={{
          background: color.bg,
          color: color.badge,
          fontWeight: 800,
          padding: '4px 10px',
          borderRadius: '4px',
          fontSize: '12px',
          border: `2px solid ${color.badge}`,
          minWidth: '60px',
          textAlign: 'center',
        }}
      >
        {name}1
      </div>

      {/* 과목명 (편집 가능) */}
      {editing ? (
        <input
          type="text"
          value={editName}
          onChange={(e) => setEditName(e.target.value)}
          onBlur={() => { if (editName !== name) onRename(editName); setEditing(false); }}
          onKeyDown={(e) => { if (e.key === 'Enter') { if (editName !== name) onRename(editName); setEditing(false); } }}
          className="flex-1 px-2 py-1 border rounded text-sm"
          autoFocus
        />
      ) : (
        <button onClick={() => { setEditName(name); setEditing(true); }} className="flex-1 text-left text-sm font-medium text-gray-800 hover:underline px-2">
          {name}
        </button>
      )}

      {/* 색상 선택 */}
      <div className="flex gap-0.5 flex-wrap">
        {COLOR_PRESETS.map((preset, i) => (
          <button
            key={i}
            onClick={() => onColorChange(preset)}
            title={preset.name}
            style={{
              background: preset.bg,
              border: color.badge === preset.badge ? `2px solid ${preset.badge}` : '1px solid #d1d5db',
              width: '22px',
              height: '22px',
              borderRadius: '3px',
              cursor: 'pointer',
            }}
          >
            <span style={{ fontSize: '10px', color: preset.badge, fontWeight: 700 }}>
              {color.badge === preset.badge ? '✓' : ''}
            </span>
          </button>
        ))}
      </div>

      <button onClick={onRemove} className="text-red-400 hover:text-red-600 px-1 text-base leading-none" title="삭제">×</button>
    </div>
  );
}

function TuitionPresetsManager({ presets, onChange }) {
  const [editingId, setEditingId] = useState(null);

  const blankPreset = () => ({
    id: `preset-${Date.now()}`,
    name: '',
    subjectName: '',
    label: '',
    classDays: [1, 3, 5],
    totalSessions: 12,
    tuition: 0,
    materialLabel: '',
    materialAmount: 0,
  });

  const addPreset = () => {
    const p = blankPreset();
    onChange([...(presets || []), p]);
    setEditingId(p.id);
  };

  const updatePreset = (id, patch) => {
    onChange((presets || []).map(p => p.id === id ? { ...p, ...patch } : p));
  };

  const removePreset = (id) => {
    if (!confirm('이 프리셋을 삭제할까요?')) return;
    onChange((presets || []).filter(p => p.id !== id));
    if (editingId === id) setEditingId(null);
  };

  const toggleClassDay = (id, dow) => {
    const p = (presets || []).find(x => x.id === id);
    if (!p) return;
    const days = p.classDays || [];
    const newDays = days.includes(dow) ? days.filter(d => d !== dow) : [...days, dow].sort((a, b) => a - b);
    updatePreset(id, { classDays: newDays });
  };

  return (
    <div>
      <div className="space-y-2 mb-3">
        {(presets || []).length === 0 && (
          <div className="text-xs text-gray-400 italic p-3 text-center border border-dashed rounded">
            등록된 프리셋이 없습니다. "+ 새 프리셋 추가"로 만들어보세요.
          </div>
        )}
        {(presets || []).map((p) => (
          <div key={p.id} className="border rounded-lg bg-gray-50">
            {/* 요약 보기 (편집 중이 아닐 때) */}
            {editingId !== p.id ? (
              <div className="p-3 flex items-center gap-2 flex-wrap">
                <div className="flex-1 min-w-0">
                  <div className="font-semibold text-gray-800 text-sm">
                    {p.name || <span className="text-gray-400 italic">(이름 없음)</span>}
                  </div>
                  <div className="text-[11px] text-gray-600 mt-0.5">
                    {p.subjectName && <span className="mr-2">과목: <strong>{p.subjectName}</strong></span>}
                    <span className="mr-2">요일: {(p.classDays || []).map(d => DAY_NAMES_KO[d]).join('·') || '-'}</span>
                    <span className="mr-2">{p.totalSessions || 0}회</span>
                    <span className="text-blue-700 font-semibold">{fmtWon(p.tuition || 0)}</span>
                    {p.materialLabel && (
                      <span className="ml-2 text-gray-500">+ {p.materialLabel} {fmtWon(p.materialAmount || 0)}</span>
                    )}
                  </div>
                </div>
                <button onClick={() => setEditingId(p.id)} className="px-2 py-1 text-xs bg-gray-200 hover:bg-gray-300 rounded">편집</button>
                <button onClick={() => removePreset(p.id)} className="px-2 py-1 text-xs text-red-600 hover:bg-red-50 rounded">삭제</button>
              </div>
            ) : (
              <div className="p-3 space-y-2 bg-blue-50 border-2 border-blue-300 rounded-lg">
                <div className="grid grid-cols-2 gap-2">
                  <div>
                    <label className="block text-[11px] text-gray-700 font-semibold mb-0.5">프리셋 이름 (드롭다운 표시용)</label>
                    <input
                      type="text"
                      value={p.name || ''}
                      onChange={(e) => updatePreset(p.id, { name: e.target.value })}
                      placeholder="예: 고등 영어 · 주 3회"
                      className="w-full px-2 py-1 border rounded text-sm"
                    />
                  </div>
                  <div>
                    <label className="block text-[11px] text-gray-700 font-semibold mb-0.5">과목명 (색상 매칭)</label>
                    <input
                      type="text"
                      value={p.subjectName || ''}
                      onChange={(e) => updatePreset(p.id, { subjectName: e.target.value })}
                      placeholder="예: 영어"
                      className="w-full px-2 py-1 border rounded text-sm"
                    />
                  </div>
                </div>
                <div>
                  <label className="block text-[11px] text-gray-700 font-semibold mb-0.5">라벨 (안내문에 표시될 이름, 선택)</label>
                  <input
                    type="text"
                    value={p.label || ''}
                    onChange={(e) => updatePreset(p.id, { label: e.target.value })}
                    placeholder="예: 고등 영어"
                    className="w-full px-2 py-1 border rounded text-sm"
                  />
                </div>
                <div>
                  <label className="block text-[11px] text-gray-700 font-semibold mb-0.5">수업 요일</label>
                  <div className="flex gap-1 flex-wrap">
                    {DAY_NAMES_KO.map((day, i) => (
                      <button
                        key={i}
                        onClick={() => toggleClassDay(p.id, i)}
                        className={`px-2.5 py-1 rounded text-xs font-medium ${(p.classDays || []).includes(i) ? 'bg-blue-600 text-white' : 'bg-gray-200 text-gray-600'}`}
                      >
                        {day}
                      </button>
                    ))}
                  </div>
                </div>
                <div className="grid grid-cols-2 gap-2">
                  <div>
                    <label className="block text-[11px] text-gray-700 font-semibold mb-0.5">총 회차</label>
                    <input
                      type="number"
                      min="1"
                      value={p.totalSessions || 12}
                      onChange={(e) => updatePreset(p.id, { totalSessions: parseInt(e.target.value) || 12 })}
                      className="w-full px-2 py-1 border rounded text-sm"
                    />
                  </div>
                  <div>
                    <label className="block text-[11px] text-gray-700 font-semibold mb-0.5">월 수강료 (원)</label>
                    <input
                      type="number"
                      min="0"
                      step="1000"
                      value={p.tuition || 0}
                      onChange={(e) => updatePreset(p.id, { tuition: parseInt(e.target.value) || 0 })}
                      className="w-full px-2 py-1 border rounded text-sm"
                    />
                  </div>
                </div>
                <div className="grid grid-cols-2 gap-2 pt-1 border-t border-blue-200">
                  <div>
                    <label className="block text-[11px] text-gray-700 font-semibold mb-0.5">교재비 항목명 (선택)</label>
                    <input
                      type="text"
                      value={p.materialLabel || ''}
                      onChange={(e) => updatePreset(p.id, { materialLabel: e.target.value })}
                      placeholder="예: 영어 교재비"
                      className="w-full px-2 py-1 border rounded text-sm"
                    />
                  </div>
                  <div>
                    <label className="block text-[11px] text-gray-700 font-semibold mb-0.5">교재비 금액 (원)</label>
                    <input
                      type="number"
                      min="0"
                      step="1000"
                      value={p.materialAmount || 0}
                      onChange={(e) => updatePreset(p.id, { materialAmount: parseInt(e.target.value) || 0 })}
                      className="w-full px-2 py-1 border rounded text-sm"
                    />
                  </div>
                </div>
                <div className="flex justify-end gap-2 pt-1">
                  <button onClick={() => removePreset(p.id)} className="px-3 py-1 text-xs text-red-600 hover:bg-red-50 rounded">삭제</button>
                  <button onClick={() => setEditingId(null)} className="px-4 py-1 bg-blue-600 text-white rounded text-xs font-semibold">완료</button>
                </div>
              </div>
            )}
          </div>
        ))}
      </div>
      <button onClick={addPreset} className="w-full px-3 py-2 bg-green-600 text-white rounded text-sm font-semibold hover:bg-green-700">
        + 새 프리셋 추가
      </button>
      <p className="text-[11px] text-gray-500 mt-3 leading-relaxed">
        💡 프리셋을 만들어두면 학생 추가 시 드롭다운에서 선택만으로 <strong>과목·요일·수강료·교재비까지 한 번에 입력</strong>됩니다.<br/>
        자주 쓰는 조합(예: "고등 영어 주 3회", "중등 수학 주 2회")을 미리 등록해두세요.
      </p>
    </div>
  );
}

function AbsenceManager({ subjectId, subjectName, absences, onAdd, onRemove }) {
  const [date, setDate] = useState('');
  const [note, setNote] = useState('');

  const handleAdd = () => {
    if (!date) return;
    if (absences.some(a => a.date === date)) {
      alert('이미 등록된 결석 날짜입니다');
      return;
    }
    onAdd(date, note);
    setDate('');
    setNote('');
  };

  return (
    <div className="mt-2 p-2 bg-red-50 border border-red-200 rounded">
      <div className="flex items-center justify-between mb-1.5">
        <span className="text-xs font-semibold text-red-700">🚫 {subjectName} 개별 결석 기록 (진행 캘린더에 표시됨)</span>
        <span className="text-[10px] text-red-500">{absences.length}건</span>
      </div>
      <div className="flex gap-1 items-center flex-wrap">
        <input type="date" value={date} onChange={(e) => setDate(e.target.value)} className="flex-1 min-w-[120px] px-2 py-1 border rounded text-xs" />
        <input type="text" value={note} onChange={(e) => setNote(e.target.value)} onKeyDown={(e) => e.key === 'Enter' && handleAdd()} placeholder="사유 (선택)" maxLength={15} className="flex-1 min-w-[80px] px-2 py-1 border rounded text-xs" />
        <button onClick={handleAdd} className="px-2 py-1 bg-red-600 text-white rounded text-xs font-medium">+ 결석</button>
      </div>
      {absences.length > 0 && (
        <div className="mt-1.5 flex flex-wrap gap-1">
          {absences.map((a, i) => (
            <span key={i} className="inline-flex items-center gap-1 bg-white border border-red-300 rounded px-1.5 py-0.5 text-[11px]">
              <span className="font-medium text-gray-700">{a.date.substring(5)}</span>
              {a.note && <span className="text-red-600 text-[10px]">({a.note})</span>}
              <button onClick={() => onRemove(a.date)} className="text-red-400 hover:text-red-700 leading-none ml-0.5">×</button>
            </span>
          ))}
        </div>
      )}
      <p className="text-[10px] text-red-500/70 mt-1">
        💡 결석 처리해도 <strong>회차 번호는 유지</strong>됩니다 (학부모께 "8회차 결석"이라고 정확히 표시)
      </p>
    </div>
  );
}

function StudentForm({ student, onSave, onCancel, defaultSettings }) {
  const [data, setData] = useState(student || {
    id: uid(),
    name: '',
    schoolName: '',
    grade: '',
    parentContact: '',
    note: '',
    periodDisplay: '',
    subjects: [],
    materials: [],
  });

  const updateField = (field, value) => setData({ ...data, [field]: value });

  const addSubject = () => setData({
    ...data,
    subjects: [...(data.subjects || []), {
      id: uid(),
      name: '',
      label: '',
      labelNote: '',
      startDate: formatDateStr(new Date()),
      classDays: defaultSettings?.classDayDefault || [2, 4, 5],
      sessionsPerWeek: 3,
      totalSessions: defaultSettings?.sessionsDefault || 12,
      tuition: 0,
      isNew: true, // 신규 등록 (지난 주기 없음)
    }],
  });

  // 프리셋에서 과목 + (선택적으로) 교재비를 한 번에 추가
  const addSubjectFromPreset = (preset) => {
    if (!preset) return;
    const newSubject = {
      id: uid(),
      name: preset.subjectName || '',
      label: preset.label || '',
      labelNote: '',
      startDate: formatDateStr(new Date()),
      classDays: preset.classDays || (defaultSettings?.classDayDefault || [2, 4, 5]),
      sessionsPerWeek: (preset.classDays || []).length || 3,
      totalSessions: preset.totalSessions || 12,
      tuition: preset.tuition || 0,
      isNew: true,
    };
    // 교재비가 프리셋에 있으면 자동 추가 (중복 제거)
    let updatedMaterials = data.materials || [];
    if (preset.materialLabel && preset.materialAmount > 0) {
      const exists = updatedMaterials.some(m => m.label === preset.materialLabel);
      if (!exists) {
        updatedMaterials = [...updatedMaterials, {
          id: uid(),
          label: preset.materialLabel,
          note: '',
          amount: preset.materialAmount,
        }];
      }
    }
    setData({
      ...data,
      subjects: [...(data.subjects || []), newSubject],
      materials: updatedMaterials,
    });
  };

  const updateSubject = (id, patch) => setData({
    ...data,
    subjects: (data.subjects || []).map(s => s.id === id ? { ...s, ...patch } : s),
  });

  const removeSubject = (id) => setData({
    ...data,
    subjects: (data.subjects || []).filter(s => s.id !== id),
  });

  const toggleSubjectDay = (subId, day) => {
    const sub = data.subjects.find(s => s.id === subId);
    if (!sub) return;
    const has = sub.classDays.includes(day);
    const newDays = has ? sub.classDays.filter(d => d !== day) : [...sub.classDays, day].sort();
    updateSubject(subId, { classDays: newDays, sessionsPerWeek: newDays.length });
  };

  const addMaterial = () => setData({
    ...data,
    materials: [...(data.materials || []), { id: uid(), label: '', note: '', amount: 0 }],
  });

  const updateMaterial = (id, patch) => setData({
    ...data,
    materials: (data.materials || []).map(m => m.id === id ? { ...m, ...patch } : m),
  });

  const removeMaterial = (id) => setData({
    ...data,
    materials: (data.materials || []).filter(m => m.id !== id),
  });

  const handleSave = () => {
    if (!data.name.trim()) { alert('학생 이름을 입력하세요'); return; }
    onSave(data);
  };

  return (
    <div className="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4 overflow-y-auto">
      <div className="bg-white rounded-xl shadow-2xl w-full max-w-3xl my-8 max-h-[90vh] overflow-y-auto">
        {/* 헤더 */}
        <div className="invoice-navy text-white px-6 py-4 flex items-center justify-between sticky top-0 z-10">
          <h2 className="text-lg font-bold">{student ? '학생 정보 수정' : '새 학생 추가'}</h2>
          <button onClick={onCancel} className="text-white/70 hover:text-white text-2xl">×</button>
        </div>

        <div className="p-6 space-y-5">
          {/* 기본 정보 */}
          <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
            <div>
              <label className="block text-xs font-semibold text-gray-700 mb-1">학생 이름 *</label>
              <input type="text" value={data.name} onChange={(e) => updateField('name', e.target.value)} className="w-full px-3 py-2 border rounded text-sm" />
            </div>
            <div>
              <label className="block text-xs font-semibold text-gray-700 mb-1">학부모 연락처 (선택)</label>
              <input type="text" value={data.parentContact || ''} onChange={(e) => updateField('parentContact', e.target.value)} className="w-full px-3 py-2 border rounded text-sm" placeholder="010-0000-0000" />
            </div>
            <div>
              <label className="block text-xs font-semibold text-gray-700 mb-1">학교명 (선택)</label>
              <input type="text" value={data.schoolName || ''} onChange={(e) => updateField('schoolName', e.target.value)} className="w-full px-3 py-2 border rounded text-sm" placeholder="예: 둔산중학교" />
            </div>
            <div>
              <label className="block text-xs font-semibold text-gray-700 mb-1">학년 (선택)</label>
              <input type="text" value={data.grade || ''} onChange={(e) => updateField('grade', e.target.value)} className="w-full px-3 py-2 border rounded text-sm" placeholder="예: 2학년" />
            </div>
            <div className="md:col-span-2">
              <label className="block text-xs font-semibold text-gray-700 mb-1">기간 표시 (선택 — 비우면 자동 계산)</label>
              <input type="text" value={data.periodDisplay || ''} onChange={(e) => updateField('periodDisplay', e.target.value)} className="w-full px-3 py-2 border rounded text-sm" placeholder="예: 2025년 03월 ~ 04월" />
            </div>
          </div>

          {/* 과목 목록 */}
          <div>
            <div className="flex items-center justify-between mb-2 flex-wrap gap-2">
              <h3 className="font-bold text-gray-800">수업 과목 (교습비)</h3>
              <div className="flex items-center gap-2">
                {(defaultSettings?.tuitionPresets || []).length > 0 && (
                  <select
                    value=""
                    onChange={(e) => {
                      const preset = (defaultSettings?.tuitionPresets || []).find(p => p.id === e.target.value);
                      if (preset) addSubjectFromPreset(preset);
                      e.target.value = ''; // 선택 초기화
                    }}
                    className="px-2 py-1 border rounded text-sm bg-green-50 border-green-300 text-green-800 font-semibold cursor-pointer"
                    title="프리셋 선택 시 과목·요일·수강료·교재비가 자동 입력됩니다"
                  >
                    <option value="">💰 프리셋에서 추가 ▼</option>
                    {(defaultSettings?.tuitionPresets || []).map(p => (
                      <option key={p.id} value={p.id}>
                        {p.name} · {fmtWon(p.tuition)}
                      </option>
                    ))}
                  </select>
                )}
                <button onClick={addSubject} className="px-3 py-1 bg-blue-600 text-white rounded text-sm">+ 빈 과목 추가</button>
              </div>
            </div>
            <div className="space-y-3">
              {(data.subjects || []).map((sub, idx) => (
                <div key={sub.id} className="border rounded-lg p-4 bg-gray-50">
                  <div className="flex items-center justify-between mb-3">
                    <span className="text-xs font-semibold text-gray-500">과목 #{idx + 1}</span>
                    <button onClick={() => removeSubject(sub.id)} className="text-red-500 text-xs hover:underline">삭제</button>
                  </div>
                  <div className="grid grid-cols-2 md:grid-cols-4 gap-2 mb-2">
                    <div>
                      <label className="block text-[11px] text-gray-600 mb-0.5">과목</label>
                      <input type="text" value={sub.name} onChange={(e) => updateSubject(sub.id, { name: e.target.value })} className="w-full px-2 py-1.5 border rounded text-sm" placeholder="예: 영어" />
                    </div>
                    <div className="col-span-2">
                      <label className="block text-[11px] text-gray-600 mb-0.5">안내문 표기명</label>
                      <input type="text" value={sub.label || ''} onChange={(e) => updateSubject(sub.id, { label: e.target.value })} className="w-full px-2 py-1.5 border rounded text-sm" placeholder="예: 고등 영어" />
                    </div>
                    <div>
                      <label className="block text-[11px] text-gray-600 mb-0.5">메모 (선택)</label>
                      <input type="text" value={sub.labelNote || ''} onChange={(e) => updateSubject(sub.id, { labelNote: e.target.value })} className="w-full px-2 py-1.5 border rounded text-sm" placeholder="예: 다과목 할인" />
                    </div>
                  </div>
                  <div className="grid grid-cols-2 md:grid-cols-4 gap-2 mb-2">
                    <div>
                      <label className="block text-[11px] text-gray-600 mb-0.5">
                        📆 이번 청구 주기 첫 수업일
                      </label>
                      <input type="date" value={sub.startDate} onChange={(e) => updateSubject(sub.id, { startDate: e.target.value })} className="w-full px-2 py-1.5 border rounded text-sm" />
                      <div className="text-[10px] text-blue-600 mt-0.5">= 계획 캘린더 1회차</div>
                    </div>
                    <div>
                      <label className="block text-[11px] text-gray-600 mb-0.5">총 회차</label>
                      <input type="number" min="1" value={sub.totalSessions} onChange={(e) => updateSubject(sub.id, { totalSessions: parseInt(e.target.value) || 12 })} className="w-full px-2 py-1.5 border rounded text-sm" />
                    </div>
                    <div className="col-span-2">
                      <label className="block text-[11px] text-gray-600 mb-0.5">월 수강료 (원)</label>
                      <input type="number" min="0" step="1000" value={sub.tuition} onChange={(e) => updateSubject(sub.id, { tuition: parseInt(e.target.value) || 0 })} className="w-full px-2 py-1.5 border rounded text-sm" />
                    </div>
                  </div>
                  <div>
                    <label className="block text-[11px] text-gray-600 mb-1">수업 요일 (주 {sub.classDays.length}회)</label>
                    <div className="flex gap-1 flex-wrap">
                      {DAY_NAMES_KO.map((day, i) => (
                        <button key={i} onClick={() => toggleSubjectDay(sub.id, i)} className={`px-3 py-1 rounded text-xs font-medium ${sub.classDays.includes(i) ? 'bg-blue-600 text-white' : 'bg-gray-200 text-gray-600'}`}>
                          {day}
                        </button>
                      ))}
                    </div>
                  </div>

                  {/* 신규 등록 체크박스 */}
                  <div className="mt-2 p-2 bg-blue-50 border border-blue-200 rounded">
                    <label className="flex items-center gap-2 cursor-pointer">
                      <input
                        type="checkbox"
                        checked={!!sub.isNew}
                        onChange={(e) => updateSubject(sub.id, { isNew: e.target.checked })}
                        className="w-4 h-4 accent-blue-600"
                      />
                      <span className="text-sm font-semibold text-blue-800">🆕 신규 등록 (지난 주기 없음)</span>
                      <span className="text-[11px] text-blue-600 ml-auto">체크 시 진행 캘린더 생성 안 됨</span>
                    </label>
                    <p className="text-[10px] text-blue-700/70 mt-1 pl-6">
                      이 과목을 처음 등록하는 학생은 체크하세요. 지난 달 진행 캘린더는 만들지 않고 <strong>계획 캘린더만</strong> 생성됩니다.
                    </p>
                  </div>

                  <SchedulePreview subject={sub} holidays={defaultSettings?.holidays} />
                  <AbsenceManager
                    subjectId={sub.id}
                    subjectName={sub.name}
                    absences={(data.absences || []).filter(a => a.subjectId === sub.id)}
                    onAdd={(date, note) => setData({
                      ...data,
                      absences: [...(data.absences || []), { subjectId: sub.id, date, note }],
                    })}
                    onRemove={(date) => setData({
                      ...data,
                      absences: (data.absences || []).filter(a => !(a.subjectId === sub.id && a.date === date)),
                    })}
                  />
                </div>
              ))}
              {(!data.subjects || data.subjects.length === 0) && (
                <div className="border-2 border-dashed border-gray-300 rounded-lg p-6 text-center text-sm text-gray-500">
                  과목을 추가하세요
                </div>
              )}
            </div>
          </div>

          {/* 교재비 */}
          <div>
            <div className="flex items-center justify-between mb-2">
              <h3 className="font-bold text-gray-800">교재비 · 컨텐츠비</h3>
              <button onClick={addMaterial} className="px-3 py-1 bg-blue-600 text-white rounded text-sm">+ 항목 추가</button>
            </div>
            <div className="space-y-2">
              {(data.materials || []).map((m) => (
                <div key={m.id} className="flex gap-2 items-end">
                  <div className="flex-1">
                    <label className="block text-[11px] text-gray-600 mb-0.5">항목명</label>
                    <input type="text" value={m.label} onChange={(e) => updateMaterial(m.id, { label: e.target.value })} className="w-full px-2 py-1.5 border rounded text-sm" placeholder="예: 영어 교재비" />
                  </div>
                  <div className="flex-1">
                    <label className="block text-[11px] text-gray-600 mb-0.5">메모</label>
                    <input type="text" value={m.note || ''} onChange={(e) => updateMaterial(m.id, { note: e.target.value })} className="w-full px-2 py-1.5 border rounded text-sm" placeholder="예: 자체교재" />
                  </div>
                  <div className="w-32">
                    <label className="block text-[11px] text-gray-600 mb-0.5">금액</label>
                    <input type="number" min="0" step="1000" value={m.amount} onChange={(e) => updateMaterial(m.id, { amount: parseInt(e.target.value) || 0 })} className="w-full px-2 py-1.5 border rounded text-sm" />
                  </div>
                  <button onClick={() => removeMaterial(m.id)} className="text-red-500 px-2 py-1.5 text-sm hover:bg-red-50 rounded">×</button>
                </div>
              ))}
            </div>
          </div>

          <div>
            <label className="block text-xs font-semibold text-gray-700 mb-1">메모 (학생용)</label>
            <textarea value={data.note || ''} onChange={(e) => updateField('note', e.target.value)} className="w-full px-3 py-2 border rounded text-sm" rows="2" />
          </div>
        </div>

        <div className="border-t px-6 py-3 flex justify-end gap-2 sticky bottom-0 bg-white">
          <button onClick={onCancel} className="px-4 py-2 border rounded text-sm">취소</button>
          <button onClick={handleSave} className="px-5 py-2 bg-blue-600 text-white rounded text-sm font-semibold">저장</button>
        </div>
      </div>
    </div>
  );
}

//  5-1. 학생 일괄 가져오기 모달
// ═══════════════════════════════════════════════════

function ImportStudentsModal({ onImport, onCancel }) {
  const [text, setText] = useState('');
  const [preview, setPreview] = useState([]);

  const parse = (raw) => {
    const lines = raw.split('\n').map(l => l.trim()).filter(Boolean);
    return lines.map(line => {
      const parts = line.split(/[,\t]/).map(p => p.trim());
      return { name: parts[0], parentContact: parts[1] || '' };
    }).filter(s => s.name);
  };

  const handleChange = (v) => {
    setText(v);
    setPreview(parse(v));
  };

  const handleImport = () => {
    if (preview.length === 0) { alert('추가할 학생이 없습니다'); return; }
    onImport(preview);
  };

  return (
    <div className="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
      <div className="bg-white rounded-xl shadow-2xl w-full max-w-2xl max-h-[90vh] overflow-y-auto">
        <div className="invoice-navy text-white px-6 py-4 flex items-center justify-between">
          <h2 className="text-lg font-bold">📥 학생 일괄 가져오기</h2>
          <button onClick={onCancel} className="text-white/70 hover:text-white text-2xl">×</button>
        </div>
        <div className="p-6 space-y-4">
          <div className="bg-blue-50 border border-blue-200 rounded p-3 text-xs text-blue-900 space-y-1">
            <div className="font-semibold">💡 입력 형식</div>
            <div>• 한 줄에 학생 한 명씩 이름 입력</div>
            <div>• 선택사항: 이름 뒤에 쉼표나 탭으로 학부모 연락처 추가</div>
            <div>• 학원 관리프로그램에서 CSV로 내보낸 내용을 그대로 붙여넣기 가능</div>
          </div>

          <div>
            <label className="block text-sm font-semibold text-gray-700 mb-1">
              학생 명단 (엑셀·CSV에서 복사해서 붙여넣기)
            </label>
            <textarea
              value={text}
              onChange={(e) => handleChange(e.target.value)}
              placeholder={'예시:\n구기원\n김철수, 010-1234-5678\n박영희\n이민수'}
              className="w-full px-3 py-2 border rounded text-sm font-mono"
              rows="10"
            />
          </div>

          {preview.length > 0 && (
            <div className="bg-gray-50 border rounded p-3">
              <div className="text-sm font-semibold mb-2 text-gray-700">
                미리보기: {preview.length}명 추가 예정
              </div>
              <div className="max-h-40 overflow-y-auto">
                <table className="w-full text-xs">
                  <thead className="text-gray-500">
                    <tr><th className="text-left py-1 px-2">#</th><th className="text-left px-2">학생명</th><th className="text-left px-2">연락처</th></tr>
                  </thead>
                  <tbody>
                    {preview.map((s, i) => (
                      <tr key={i} className="border-t border-gray-200">
                        <td className="py-1 px-2 text-gray-400">{i + 1}</td>
                        <td className="px-2 font-medium">{s.name}</td>
                        <td className="px-2 text-gray-600">{s.parentContact || '-'}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </div>
          )}

          <div className="text-xs text-gray-500">
            ⓘ 추가된 학생은 과목·수강료가 비어있으니, 가져온 뒤 각 학생을 편집해서 정보를 채워주세요.
          </div>
        </div>
        <div className="border-t px-6 py-3 flex justify-end gap-2">
          <button onClick={onCancel} className="px-4 py-2 border rounded text-sm">취소</button>
          <button onClick={handleImport} disabled={preview.length === 0} className="px-5 py-2 bg-blue-600 text-white rounded text-sm font-semibold disabled:bg-gray-400">
            {preview.length}명 추가하기
          </button>
        </div>
      </div>
    </div>
  );
}

//  5-2. 데이터 내보내기·가져오기 유틸
// ═══════════════════════════════════════════════════

const exportJSON = (students, settings) => {
  const data = {
    version: '1.0',
    exportedAt: new Date().toISOString(),
    students,
    settings,
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const date = new Date().toISOString().split('T')[0];
  a.download = `수강료생성기_백업_${date}.json`;
  a.href = url;
  a.click();
  URL.revokeObjectURL(url);
  // 백업 시점 기록 (자동 백업 알림용)
  storage.set('tuition_last_backup_at', new Date().toISOString());
  storage.set('tuition_backup_snooze_until', '');
};

const importJSON = (file, onLoad) => {
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const data = JSON.parse(e.target.result);
      if (!data.students || !Array.isArray(data.students)) {
        throw new Error('올바른 백업 파일이 아닙니다');
      }
      onLoad(data);
    } catch (err) {
      alert('가져오기 실패: ' + err.message);
    }
  };
  reader.readAsText(file);
};

// 모든 학생을 다음 주기로 이동
const advanceAllStudents = (students, holidays) => {
  const holidaySet = new Set((holidays || []).map(h => h.date));
  return students.map(s => ({
    ...s,
    subjects: (s.subjects || []).map(sub => {
      if (!sub.startDate || !sub.classDays || sub.classDays.length === 0) return sub;
      const sessions = getClassSessions(parseDate(sub.startDate), sub.classDays, sub.totalSessions, holidaySet);
      if (sessions.length === 0) return sub;
      const endDate = sessions[sessions.length - 1].date;
      const nextStart = getNextClassDay(endDate, sub.classDays, holidaySet);
      if (!nextStart) return sub;
      return { ...sub, startDate: formatDateStr(nextStart) };
    }),
  }));
};
