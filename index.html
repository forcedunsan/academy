                  </td>
                  <td className="px-3 py-2 text-right font-medium text-gray-700">{fmtWon(tuitionSum)}</td>
                  <td className="px-3 py-2 text-right text-gray-600">{fmtWon(materialSum)}</td>
                  <td className="px-3 py-2 text-center">
                    <div className="flex gap-1 justify-center" onClick={(e) => e.stopPropagation()}>
                      <button onClick={() => onEdit(s.id)} className="px-2 py-1 text-xs bg-gray-100 hover:bg-gray-200 rounded">편집</button>
                      <button onClick={() => onDuplicate(s.id)} className="px-2 py-1 text-xs bg-gray-100 hover:bg-gray-200 rounded">복제</button>
                      <button
                        onClick={() => onAdvanceOne(s.id)}
                        disabled={s.isWithdrawn || s.isSuspended}
                        className={`px-2 py-1 text-xs rounded ${(s.isWithdrawn || s.isSuspended) ? 'bg-gray-50 text-gray-300 cursor-not-allowed' : 'bg-emerald-100 hover:bg-emerald-200 text-emerald-700 font-semibold'}`}
                        title={s.isWithdrawn ? '퇴원 학생은 주기 이동 불가' : s.isSuspended ? '휴원 학생은 주기 이동 불가' : '이 학생만 다음 주기(또는 다음 달)로 이동'}
                      >
                        ➡️ 다음
                      </button>
                      <button onClick={() => { if (confirm(`${s.name} 학생을 삭제하시겠습니까?`)) onDelete(s.id); }} className="px-2 py-1 text-xs text-red-600 hover:bg-red-50 rounded">삭제</button>
                    </div>
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════
//  6. 안내문 미리보기 탭
// ═══════════════════════════════════════════════════

function InvoiceTab({ students, settings, selectedId, onSelect, privacyMode }) {
  const invoiceRef = useRef(null);
  const currentCalRef = useRef(null);
  const planCalRef = useRef(null);

  const bulkInvoiceRef = useRef(null);
  const bulkCurrentRef = useRef(null);
  const bulkPlanRef = useRef(null);
  const bulkResolveRef = useRef(null);

  const [exportingType, setExportingType] = useState(null);
  const [activeView, setActiveView] = useState('invoice');
  const [bulkExporting, setBulkExporting] = useState(false);
  const [bulkProgress, setBulkProgress] = useState({ current: 0, total: 0, name: '', step: '' });
  const [bulkCurrentStudent, setBulkCurrentStudent] = useState(null);
  // 선택된 과목 ID 집합 (학생 변경시 전체 선택으로 초기화)
  const [selectedSubjectIds, setSelectedSubjectIds] = useState(null);
  // 교재비도 과목별로 필터링할지 (기본: 청구 과목명과 관련된 교재만 포함)
  const [filterMaterials, setFilterMaterials] = useState(true);

  const originalStudent = students.find(s => s.id === selectedId);

  // 학생이 바뀌면 모든 과목 선택으로 초기화
  useEffect(() => {
    if (originalStudent) {
      setSelectedSubjectIds(new Set((originalStudent.subjects || []).map(s => s.id)));
    } else {
      setSelectedSubjectIds(null);
    }
  }, [selectedId]);

  // 선택된 과목만 포함된 가상 학생 객체 생성
  const buildFilteredStudent = (src, selectedIds) => {
    if (!src) return null;
    if (!selectedIds || selectedIds.size === (src.subjects || []).length) {
      return src; // 전체 선택이면 원본 그대로
    }
    const filteredSubjects = (src.subjects || []).filter(sub => selectedIds.has(sub.id));
    const selectedSubjectNames = new Set(filteredSubjects.map(s => s.name));
    // 교재비도 선택된 과목명과 관련된 것만 (이름에 과목명 포함된 것)
    let filteredMaterials = src.materials || [];
    if (filterMaterials) {
      filteredMaterials = filteredMaterials.filter(m => {
        if (!m.label) return false;
        // 선택된 과목명 중 하나라도 교재비 라벨에 포함되면 유지
        for (const name of selectedSubjectNames) {
          if (m.label.includes(name)) return true;
        }
        return false;
      });
    }
    return {
      ...src,
      subjects: filteredSubjects,
      materials: filteredMaterials,
    };
  };

  const student = buildFilteredStudent(originalStudent, selectedSubjectIds);

  // 선택된 과목명 (파일명용)
  const selectedSubjectNamesStr = (() => {
    if (!originalStudent || !selectedSubjectIds) return '';
    const allSubjects = originalStudent.subjects || [];
    if (selectedSubjectIds.size === allSubjects.length) return '';
    return allSubjects
      .filter(s => selectedSubjectIds.has(s.id))
      .map(s => s.name)
      .join('+');
  })();

  const buildFilename = (prefix) => {
    if (!originalStudent) return prefix;
    if (selectedSubjectNamesStr) {
      return `${prefix}_${originalStudent.name}_${selectedSubjectNamesStr}`;
    }
    return `${prefix}_${originalStudent.name}`;
  };

  const toggleSubject = (subjectId) => {
    if (!selectedSubjectIds) return;
    const newSet = new Set(selectedSubjectIds);
    if (newSet.has(subjectId)) newSet.delete(subjectId);
    else newSet.add(subjectId);
    setSelectedSubjectIds(newSet);
  };

  const selectAllSubjects = () => {
    if (!originalStudent) return;
    setSelectedSubjectIds(new Set((originalStudent.subjects || []).map(s => s.id)));
  };

  const exportSingle = async (ref, filename, bg) => {
    if (!ref.current || !student) return;
    setExportingType(filename);
    try {
      const el = ref.current;
      const w = el.offsetWidth;
      const h = el.offsetHeight;
      
      let dataUrl;
      // modern-screenshot 우선 시도 (한글 렌더링 훨씬 정확)
      if (window.modernScreenshot && window.modernScreenshot.domToPng) {
        dataUrl = await window.modernScreenshot.domToPng(el, {
          scale: 2,
          backgroundColor: bg,
          width: w,
          height: h,
          style: { transformOrigin: 'top left' },
        });
      } else {
        // 폴백: html2canvas
        const canvas = await html2canvas(el, {
          scale: 2,
          backgroundColor: bg,
          logging: false,
          width: w,
          height: h,
          windowWidth: w,
          windowHeight: h,
        });
        dataUrl = canvas.toDataURL('image/png');
      }
      
      const link = document.createElement('a');
      link.download = `${buildFilename(filename)}.png`;
      link.href = dataUrl;
      link.click();
    } catch (e) {
      alert('이미지 저장 중 오류: ' + e.message);
    }
    setExportingType(null);
  };

  // 📄 PDF 저장: 브라우저 네이티브 인쇄 사용 (완벽한 한글 렌더링)
  const exportPDF = (ref) => {
    if (!ref.current) return;
    
    const el = ref.current;
    
    // 원래 문서 타이틀 저장 (PDF 파일명으로 사용됨)
    const originalTitle = document.title;
    const studentName = student?.name || '학생';
    const cycleLabel = (() => {
      try { return new Date().toISOString().slice(0, 7).replace('-', '년') + '월'; }
      catch { return ''; }
    })();
    document.title = `${studentName}_수강료안내_${cycleLabel}`;
    
    // print-target 클래스 부여
    el.classList.add('print-target');
    
    // 인쇄 다이얼로그 열기
    setTimeout(() => {
      window.print();
      
      // 인쇄 다이얼로그 닫힌 후 정리
      setTimeout(() => {
        el.classList.remove('print-target');
        document.title = originalTitle;
      }, 500);
    }, 100);
  };

  useEffect(() => {
    if (!bulkCurrentStudent) return;
    const t = setTimeout(async () => {
      const results = { invoice: null, current: null, plan: null };
      
      const captureWith = async (el, bg) => {
        const w = el.offsetWidth, h = el.offsetHeight;
        
        // modern-screenshot 우선 시도
        if (window.modernScreenshot && window.modernScreenshot.domToBlob) {
          return await window.modernScreenshot.domToBlob(el, {
            scale: 2,
            backgroundColor: bg,
            width: w,
            height: h,
            style: { transformOrigin: 'top left' },
          });
        }
        
        // 폴백: html2canvas
        const canvas = await html2canvas(el, {
          scale: 2, backgroundColor: bg, logging: false,
          width: w, height: h, windowWidth: w, windowHeight: h,
        });
        return await new Promise(r => canvas.toBlob(r, 'image/png'));
      };
      
      try {
        const themeNavy = getComputedStyle(document.documentElement).getPropertyValue('--theme-navy').trim() || '#1a2344';
        if (bulkInvoiceRef.current) {
          results.invoice = await captureWith(bulkInvoiceRef.current, themeNavy);
        }
        if (bulkCurrentRef.current) {
          results.current = await captureWith(bulkCurrentRef.current, '#ffffff');
        }
        if (bulkPlanRef.current) {
          results.plan = await captureWith(bulkPlanRef.current, '#ffffff');
        }
      } catch (e) {
        console.error('Bulk capture error:', e);
      }
      if (bulkResolveRef.current) bulkResolveRef.current(results);
    }, 300);
    return () => clearTimeout(t);
  }, [bulkCurrentStudent]);

  const captureStudent = (s) => new Promise((resolve) => {
    bulkResolveRef.current = resolve;
    setBulkCurrentStudent(s);
  });

  const exportAllZip = async () => {
    const valid = sortStudentsByName(students.filter(s => !s.isWithdrawn && !s.isSuspended && (s.subjects || []).length > 0));
    if (valid.length === 0) {
      alert('과목이 입력된 재원생이 없습니다. 먼저 학생 정보를 입력해주세요.');
      return;
    }
    const withdrawnCount = students.filter(s => s.isWithdrawn).length;
    const noSubjectCount = students.filter(s => !s.isWithdrawn && (s.subjects || []).length === 0).length;
    const skippedMsgs = [];
    if (withdrawnCount > 0) skippedMsgs.push(`퇴원생 ${withdrawnCount}명 제외`);
    if (noSubjectCount > 0) skippedMsgs.push(`과목 미입력 ${noSubjectCount}명 제외`);
    const skippedLine = skippedMsgs.length > 0 ? `\n(${skippedMsgs.join(', ')})` : '';
    const msg = `${valid.length}명의 수강료 안내문 + 진행/계획 캘린더를 모두 저장합니다.` +
                skippedLine +
                `\n학생당 폴더 1개, 3장씩 = 총 ${valid.length * 3}장 이미지\n\n시간이 꽤 걸릴 수 있습니다. 진행하시겠습니까?`;
    if (!confirm(msg)) return;

    setBulkExporting(true);
    setBulkProgress({ current: 0, total: valid.length, name: '', step: '' });
    const zip = new JSZip();

    for (let i = 0; i < valid.length; i++) {
      const s = valid[i];
      setBulkProgress({ current: i + 1, total: valid.length, name: s.name, step: '' });
      const results = await captureStudent(s);
      const folder = zip.folder(s.name);
      if (results.invoice) folder.file(`1_수강료안내_${s.name}.png`, results.invoice);
      // 월정액 학생은 캘린더 생성 안 함
      if (!s.isMonthly) {
        if (results.current) folder.file(`2_진행캘린더_${s.name}.png`, results.current);
        if (results.plan) folder.file(`3_계획캘린더_${s.name}.png`, results.plan);
      }
    }

    setBulkCurrentStudent(null);

    try {
      setBulkProgress(p => ({ ...p, step: 'ZIP 파일 생성 중...' }));
      const zipBlob = await zip.generateAsync({ type: 'blob' });
      const url = URL.createObjectURL(zipBlob);
      const a = document.createElement('a');
      const date = new Date().toISOString().split('T')[0];
      a.download = `수강료안내_전체_${date}.zip`;
      a.href = url;
      a.click();
      URL.revokeObjectURL(url);
    } catch (e) {
      alert('ZIP 생성 실패: ' + e.message);
    }
    setBulkExporting(false);
  };

  const [showWithdrawnInSidebar, setShowWithdrawnInSidebar] = useState(false);
  const sidebarStudents = sortStudentsByName(showWithdrawnInSidebar ? students : students.filter(s => !s.isWithdrawn));
  const activeCount = students.filter(s => !s.isWithdrawn).length;
  const withdrawnCountInTab = students.filter(s => s.isWithdrawn).length;

  return (
    <div className="grid grid-cols-1 lg:grid-cols-[280px_1fr] gap-4">
      {/* 학생 선택 */}
      <div className="bg-white rounded-lg border p-3 lg:max-h-[85vh] lg:overflow-y-auto">
        <h3 className="font-bold text-sm mb-2 text-gray-700">재원생{privacyMode ? '' : ` (${activeCount}명)`}</h3>
        {withdrawnCountInTab > 0 && (
          <label className="flex items-center gap-1.5 text-[11px] text-gray-500 cursor-pointer mb-2 px-2 py-1 bg-gray-50 rounded hover:bg-gray-100">
            <input type="checkbox" checked={showWithdrawnInSidebar} onChange={(e) => setShowWithdrawnInSidebar(e.target.checked)} className="w-3 h-3" />
            <span>퇴원생 포함 ({withdrawnCountInTab})</span>
          </label>
        )}
        <button
          onClick={exportAllZip}
          disabled={bulkExporting || students.length === 0}
          className="w-full mb-3 px-3 py-2 bg-green-600 text-white rounded text-xs font-semibold disabled:bg-gray-300"
        >
          {bulkExporting ? `생성 중... ${bulkProgress.current}/${bulkProgress.total}` : '📦 전체 ZIP 일괄 저장'}
        </button>
        {bulkExporting && (
          <div className="text-[10px] text-gray-500 text-center mb-2">
            <div>{bulkProgress.name}</div>
            {bulkProgress.step && <div className="text-blue-600 font-semibold">{bulkProgress.step}</div>}
            <div className="mt-1 h-1 bg-gray-200 rounded overflow-hidden">
              <div className="h-full bg-green-500 transition-all" style={{ width: `${(bulkProgress.current / bulkProgress.total) * 100}%` }}></div>
            </div>
          </div>
        )}
        <div className="space-y-1">
          {sidebarStudents.map((s) => {
            const sc = (s.subjects || []).length;
            return (
              <button key={s.id} onClick={() => onSelect(s.id)} className={`w-full text-left px-3 py-2 rounded text-sm transition ${selectedId === s.id ? 'invoice-navy text-white font-semibold' : 'hover:bg-gray-100 text-gray-700'} ${s.isWithdrawn ? 'opacity-60' : ''}`}>
                <div className="flex items-center justify-between">
                  <span className="flex items-center gap-1">
                    {s.name}
                    {s.isWithdrawn && <span className="text-[9px] px-1 py-0 bg-rose-100 text-rose-700 rounded">퇴원</span>}
                  </span>
                  <span className={`text-[10px] ${selectedId === s.id ? 'text-white/70' : sc === 0 ? 'text-orange-500' : 'text-gray-400'}`}>
                    {sc === 0 ? '과목 미입력' : `${sc}과목`}
                  </span>
                </div>
              </button>
            );
          })}
          {students.length === 0 && (
            <div className="text-center text-xs text-gray-400 py-6">학생 관리 탭에서<br/>먼저 학생을 추가하세요</div>
          )}
        </div>
      </div>

      {/* 미리보기 영역 */}
      <div>
        {student ? (
          <>
            {/* 보기 전환 탭 */}
            <div className="bg-white border rounded-lg p-1.5 mb-3 flex gap-1 overflow-x-auto shadow-sm">
              <button onClick={() => setActiveView('invoice')} className={`px-3 py-1.5 rounded text-sm font-semibold whitespace-nowrap transition ${activeView === 'invoice' ? 'invoice-navy text-white' : 'bg-gray-100 hover:bg-gray-200 text-gray-700'}`}>
                📋 수강료 안내문
              </button>
              <button onClick={() => setActiveView('current')} className={`px-3 py-1.5 rounded text-sm font-semibold whitespace-nowrap transition ${activeView === 'current' ? 'invoice-navy text-white' : 'bg-gray-100 hover:bg-gray-200 text-gray-700'}`}>
                📅 진행 캘린더
              </button>
              <button onClick={() => setActiveView('plan')} className={`px-3 py-1.5 rounded text-sm font-semibold whitespace-nowrap transition ${activeView === 'plan' ? 'invoice-navy text-white' : 'bg-gray-100 hover:bg-gray-200 text-gray-700'}`}>
                📆 계획 캘린더
              </button>
              <div className="flex-1"></div>
              <button onClick={() => setActiveView('all')} className={`px-3 py-1.5 rounded text-sm font-semibold whitespace-nowrap transition ${activeView === 'all' ? 'invoice-navy text-white' : 'bg-gray-100 hover:bg-gray-200 text-gray-700'}`}>
                전체 보기
              </button>
            </div>

            {/* 과목 필터 (이번 청구에 포함할 과목 선택) */}
            {originalStudent && (originalStudent.subjects || []).length > 0 && selectedSubjectIds && (
              <div className="bg-white border rounded-lg p-3 mb-3 shadow-sm">
                <div className="flex items-center gap-2 flex-wrap mb-2">
                  <span className="text-xs font-semibold text-gray-700">✅ 이번 청구에 포함할 과목:</span>
                  <button onClick={selectAllSubjects} className="text-[11px] text-blue-600 hover:underline">전체 선택</button>
                  {selectedSubjectNamesStr && (
                    <span className="text-[11px] text-orange-600 font-semibold ml-auto">⚠️ 일부 과목만 선택됨 (파일명에 과목명 포함)</span>
                  )}
                </div>
                <div className="flex gap-2 flex-wrap">
                  {(originalStudent.subjects || []).map((sub) => {
                    const color = resolveSubjectColor(sub.name, settings);
                    const checked = selectedSubjectIds.has(sub.id);
                    return (
                      <label
                        key={sub.id}
                        className={`flex items-center gap-1.5 px-3 py-1.5 border-2 rounded cursor-pointer transition text-sm ${checked ? 'bg-white' : 'bg-gray-100 opacity-50'}`}
                        style={{ borderColor: checked ? color.badge : '#d1d5db' }}
                      >
                        <input
                          type="checkbox"
                          checked={checked}
                          onChange={() => toggleSubject(sub.id)}
                          className="w-4 h-4 accent-blue-600"
                        />
                        <span style={{ fontWeight: 700, color: checked ? color.badge : '#6b7280' }}>{sub.name}</span>
                        <span className="text-[11px] text-gray-500">· {fmtWon(sub.tuition)}</span>
                      </label>
                    );
                  })}
                </div>
                <div className="mt-2 flex items-center gap-2 text-[11px] text-gray-600">
                  <label className="flex items-center gap-1 cursor-pointer">
                    <input type="checkbox" checked={filterMaterials} onChange={(e) => setFilterMaterials(e.target.checked)} className="w-3 h-3" />
                    <span>교재비도 선택 과목에 맞춰 자동 필터링</span>
                  </label>
                  <span className="text-gray-400">(교재비 항목명에 과목명이 포함된 것만 포함)</span>
                </div>
              </div>
            )}

            {/* 빈 상태: 과목 전부 해제 */}
            {originalStudent && selectedSubjectIds && selectedSubjectIds.size === 0 && (
              <div className="bg-amber-50 border border-amber-300 rounded-lg p-6 text-center">
                <div className="text-amber-800 font-semibold">⚠️ 선택된 과목이 없습니다</div>
                <div className="text-amber-700 text-xs mt-1">위 체크박스에서 과목을 하나 이상 선택해주세요</div>
              </div>
            )}

            {selectedSubjectIds && selectedSubjectIds.size > 0 && (
            <>
            {(activeView === 'invoice' || activeView === 'all') && (
              <div className="mb-4">
                <div className="mb-2 flex justify-between items-center">
                  <span className="text-[11px] text-gray-500">💡 카톡 전송은 <strong className="text-purple-600">PDF</strong> 또는 <strong className="text-blue-600">화면 캡처</strong>(Win+Shift+S)를 권장합니다</span>
                  <div className="flex gap-2">
                    <button onClick={() => exportPDF(invoiceRef)} disabled={exportingType !== null} className="px-3 py-1.5 bg-purple-600 text-white rounded text-xs font-semibold disabled:bg-gray-400 shadow" title="브라우저 인쇄로 고품질 PDF 저장 (한글 정확, 추천)">
                      📄 안내문 PDF ⭐
                    </button>
                    <button onClick={() => exportSingle(invoiceRef, '수강료안내', getComputedStyle(document.documentElement).getPropertyValue('--theme-navy').trim() || '#1a2344')} disabled={exportingType !== null} className="px-3 py-1.5 bg-blue-600 text-white rounded text-xs font-semibold disabled:bg-gray-400">
                      {exportingType === '수강료안내' ? '저장 중...' : '🖼️ 안내문 PNG'}
                    </button>
                  </div>
                </div>
                <div className="flex justify-center">
                  <InvoiceView student={student} settings={settings} invoiceRef={invoiceRef} />
                </div>
              </div>
            )}

            {/* 진행 캘린더: 최소 하나라도 신규 등록이 아닌 과목이 있어야 표시 */}
            {/* 진행 캘린더: 월정액 학생 제외, 최소 하나라도 신규 등록이 아닌 과목이 있어야 표시 */}
            {(activeView === 'current' || activeView === 'all') && student && !student.isMonthly && (student.subjects || []).some(s => !s.isNew) && (
              <div className="mb-4">
                <div className="mb-2 flex justify-between items-center">
                  {(student.subjects || []).some(s => s.isNew) && (
                    <span className="text-[11px] text-amber-700 bg-amber-50 border border-amber-200 px-2 py-0.5 rounded">
                      ℹ️ 신규 등록 과목은 진행 캘린더에서 제외됨
                    </span>
                  )}
                  <div className="flex-1"></div>
                  <button onClick={() => exportPDF(currentCalRef)} disabled={exportingType !== null} className="px-3 py-1.5 bg-purple-600 text-white rounded text-xs font-semibold disabled:bg-gray-400 mr-2" title="브라우저 인쇄로 고품질 PDF 저장">
                    📄 진행 PDF
                  </button>
                  <button onClick={() => exportSingle(currentCalRef, '진행캘린더', '#ffffff')} disabled={exportingType !== null} className="px-3 py-1.5 bg-amber-600 text-white rounded text-xs font-semibold disabled:bg-gray-400">
                    {exportingType === '진행캘린더' ? '저장 중...' : '🖼️ 진행 캘린더 PNG'}
                  </button>
                </div>
                <div className="flex justify-center">
                  <CalendarView student={student} settings={settings} mode="current" calendarRef={currentCalRef} />
                </div>
              </div>
            )}

            {/* 전 과목이 신규 등록인 경우 안내 */}
            {(activeView === 'current' || activeView === 'all') && student && (student.subjects || []).length > 0 && (student.subjects || []).every(s => s.isNew) && (
              <div className="mb-4 bg-amber-50 border-2 border-amber-300 rounded-lg p-8 text-center">
                <div className="text-3xl mb-2">🆕</div>
                <div className="text-amber-800 font-bold mb-1">신규 등록 학생입니다</div>
                <div className="text-amber-700 text-xs">
                  모든 과목이 신규 등록 상태라 <strong>진행 캘린더가 생성되지 않습니다</strong>.<br/>
                  계획 캘린더만 학부모님께 보내시면 됩니다.
                </div>
              </div>
            )}

            {/* 월정액 학생 안내 배너 */}
            {student && student.isMonthly && (activeView === 'current' || activeView === 'plan' || activeView === 'all') && (
              <div className="mb-4 bg-blue-50 border-2 border-blue-300 rounded-lg p-6 text-center">
                <div className="text-3xl mb-2">📅</div>
                <div className="text-blue-800 font-bold mb-1">월정액 학생입니다</div>
                <div className="text-blue-700 text-xs">
                  월정액 학생은 <strong>회차·캘린더 생성 없이 총액만</strong> 안내됩니다.<br/>
                  📋 <strong>수강료 안내문</strong> 탭에서 PNG/PDF로 저장하세요.
                </div>
              </div>
            )}

            {(activeView === 'plan' || activeView === 'all') && !student.isMonthly && (
              <div className="mb-4">
                <div className="mb-2 flex justify-end gap-2">
                  <button onClick={() => exportPDF(planCalRef)} disabled={exportingType !== null} className="px-3 py-1.5 bg-purple-600 text-white rounded text-xs font-semibold disabled:bg-gray-400" title="브라우저 인쇄로 고품질 PDF 저장">
                    📄 계획 PDF
                  </button>
                  <button onClick={() => exportSingle(planCalRef, '계획캘린더', '#ffffff')} disabled={exportingType !== null} className="px-3 py-1.5 bg-rose-600 text-white rounded text-xs font-semibold disabled:bg-gray-400">
                    {exportingType === '계획캘린더' ? '저장 중...' : '🖼️ 계획 캘린더 PNG'}
                  </button>
                </div>
                <div className="flex justify-center">
                  <CalendarView student={student} settings={settings} mode="plan" calendarRef={planCalRef} />
                </div>
              </div>
            )}
            </>
            )}
          </>
        ) : (
          <div className="bg-white rounded-lg border p-16 text-center text-gray-400">
            왼쪽에서 학생을 선택하세요
          </div>
        )}
      </div>

      {/* 숨겨진 일괄 생성용 영역 */}
      {bulkCurrentStudent && (
        <div style={{ position: 'fixed', left: '-10000px', top: 0, pointerEvents: 'none' }}>
          <InvoiceView student={bulkCurrentStudent} settings={settings} invoiceRef={bulkInvoiceRef} />
          {/* 진행 캘린더: 최소 하나라도 신규 등록이 아닌 과목이 있을 때만 렌더링 */}
          {(bulkCurrentStudent.subjects || []).some(s => !s.isNew) && (
            <CalendarView student={bulkCurrentStudent} settings={settings} mode="current" calendarRef={bulkCurrentRef} />
          )}
          <CalendarView student={bulkCurrentStudent} settings={settings} mode="plan" calendarRef={bulkPlanRef} />
        </div>
      )}
    </div>
  );
}

// ═══════════════════════════════════════════════════
//  6.5. 통계·리포트 탭 (엑셀 다운로드 + 월별 수입 그래프)
// ═══════════════════════════════════════════════════

function ReportsTab({ students, settings, privacyMode }) {
  // 프라이버시 모드일 때 금액/숫자 마스킹
  const mask = (val, suffix = '') => privacyMode ? '•••' : `${val.toLocaleString()}${suffix}`;
  const maskNum = (val, suffix = '') => privacyMode ? '•••' : `${val}${suffix}`;
  const chartRef = React.useRef(null);
  const chartInstanceRef = React.useRef(null);
  
  // 재원생만 필터 + 가나다순 정렬 (퇴원·휴원 제외)
  const activeStudents = sortStudentsByName(students.filter(s => !s.isWithdrawn && !s.isSuspended));
  const withdrawnStudents = sortStudentsByName(students.filter(s => s.isWithdrawn));
  const suspendedStudents = sortStudentsByName(students.filter(s => s.isSuspended && !s.isWithdrawn));
  
  // 연도 선택 상태
  const currentYear = new Date().getFullYear();
  const [selectedYear, setSelectedYear] = React.useState(currentYear);
  
  // 학생 총 금액 계산 (교습비 + 교재비)
  const getStudentAmount = (s) => {
    const tuition = (s.subjects || []).reduce((sum, sub) => sum + (Number(sub.tuition) || 0), 0);
    const material = (s.materials || []).reduce((sum, m) => sum + (Number(m.amount) || 0), 0);
    return { tuition, material, total: tuition + material };
  };
  
  // 월별 통계 계산
  const getMonthlyStats = (year) => {
    const months = [];
    for (let m = 1; m <= 12; m++) {
      const ym = `${year}-${String(m).padStart(2, '0')}`;
      
      // 완납 학생
      const paidStudents = activeStudents.filter(s => {
        const p = s.payments && s.payments[ym];
        return p && p.status === 'paid';
      });
      
      // 완납 기록이 1명이라도 있으면 "활성 달" → 재원생 전체가 청구 대상
      // 완납 기록이 0명이면 "비활성 달"(수업 전/미래) → 청구액 0
      const isActiveMonth = paidStudents.length > 0;
      
      // 실 납부액 (완납 학생) - 교습비/교재비 분리
      const paidTuition = paidStudents.reduce((sum, s) => sum + getStudentAmount(s).tuition, 0);
      const paidMaterial = paidStudents.reduce((sum, s) => sum + getStudentAmount(s).material, 0);
      const paidAmount = paidTuition + paidMaterial;
      
      // 총 청구액: 활성 달이면 재원생 전체, 비활성 달이면 0
      const billedTuition = isActiveMonth ? activeStudents.reduce((sum, s) => sum + getStudentAmount(s).tuition, 0) : 0;
      const billedMaterial = isActiveMonth ? activeStudents.reduce((sum, s) => sum + getStudentAmount(s).material, 0) : 0;
      
      months.push({
        month: m,
        yearMonth: ym,
        isActiveMonth,
        totalStudents: isActiveMonth ? activeStudents.length : 0,
        paidCount: paidStudents.length,
        unpaidCount: isActiveMonth ? (activeStudents.length - paidStudents.length) : 0,
        paidTuition,
        paidMaterial,
        paidAmount,
        billedTuition,
        billedMaterial,
        billedAmount: billedTuition + billedMaterial,
      });
    }
    return months;
  };
  
  const monthlyStats = getMonthlyStats(selectedYear);
  const yearTotal = monthlyStats.reduce((sum, m) => sum + m.paidAmount, 0);
  const yearTuitionTotal = monthlyStats.reduce((sum, m) => sum + m.paidTuition, 0);
  const yearMaterialTotal = monthlyStats.reduce((sum, m) => sum + m.paidMaterial, 0);
  
  // 차트 그리기
  React.useEffect(() => {
    if (!chartRef.current || !window.Chart) return;
    if (chartInstanceRef.current) {
      chartInstanceRef.current.destroy();
    }
    const ctx = chartRef.current.getContext('2d');
    chartInstanceRef.current = new window.Chart(ctx, {
      type: 'bar',
      data: {
        labels: monthlyStats.map(m => `${m.month}월`),
        datasets: [
          {
            label: '월별 수입',
            data: monthlyStats.map(m => m.paidAmount),
            backgroundColor: 'rgba(99, 102, 241, 0.8)',
            borderColor: 'rgb(79, 70, 229)',
            borderWidth: 1,
            borderRadius: 4,
          },
        ],
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { display: false },
          tooltip: {
            callbacks: {
              label: (ctx) => `${ctx.parsed.y.toLocaleString()}원`,
            },
          },
        },
        scales: {
          y: {
            beginAtZero: true,
            ticks: {
              callback: (value) => value >= 10000 ? `${(value/10000).toFixed(0)}만` : value,
            },
          },
        },
      },
    });
    return () => {
      if (chartInstanceRef.current) {
        chartInstanceRef.current.destroy();
      }
    };
  }, [selectedYear, students]);
  
  // 엑셀 다운로드
  const downloadExcel = () => {
    if (!window.XLSX) {
      alert('엑셀 라이브러리가 로드되지 않았습니다. 페이지를 새로고침해주세요.');
      return;
    }
    
    const wb = window.XLSX.utils.book_new();
    
    // ─── 시트 1: 전체 학생 월별 납부 현황 ───
    const sheet1Data = [];
    // 헤더
    const header1 = ['번호', '학생명', '학교', '학년'];
    for (let m = 1; m <= 12; m++) {
      header1.push(`${m}월 상태`, `${m}월 금액`, `${m}월 납부일`);
    }
    header1.push('연간 총액');
    sheet1Data.push(header1);
    
    // 데이터
    activeStudents.forEach((s, idx) => {
      const row = [idx + 1, s.name, s.schoolName || '', s.grade || ''];
      let yearSum = 0;
      for (let m = 1; m <= 12; m++) {
        const ym = `${selectedYear}-${String(m).padStart(2, '0')}`;
        const p = (s.payments && s.payments[ym]) || {};
        const isPaid = p.status === 'paid';
        const amount = getStudentAmount(s).total;
        row.push(isPaid ? '✅ 완납' : '❌ 미납');
        row.push(isPaid ? amount : 0);
        row.push(p.paidDate || '');
        if (isPaid) yearSum += amount;
      }
      row.push(yearSum);
      sheet1Data.push(row);
    });
    
    const ws1 = window.XLSX.utils.aoa_to_sheet(sheet1Data);
    // 열 너비 설정
    ws1['!cols'] = [
      { wch: 6 }, { wch: 10 }, { wch: 14 }, { wch: 8 },
      ...Array(36).fill({ wch: 10 }),
      { wch: 14 },
    ];
    window.XLSX.utils.book_append_sheet(wb, ws1, `${selectedYear}년 월별 현황`);
    
    // ─── 시트 2: 학생별 연간 이력 ───
    const sheet2Data = [];
    sheet2Data.push(['학생명', '학교', '학년', '과목 구성', '월 기본금액', '연간 납부 횟수', '연간 총 납부액', '미납 월']);
    
    activeStudents.forEach((s) => {
      const amount = getStudentAmount(s);
      const subjects = (s.subjects || []).map(sub => sub.label || sub.name).join(', ');
      let paidCount = 0;
      let yearSum = 0;
      const unpaidMonths = [];
      for (let m = 1; m <= 12; m++) {
        const ym = `${selectedYear}-${String(m).padStart(2, '0')}`;
        const p = (s.payments && s.payments[ym]) || {};
        if (p.status === 'paid') {
          paidCount++;
          yearSum += amount.total;
        } else {
          unpaidMonths.push(`${m}월`);
        }
      }
      sheet2Data.push([
        s.name,
        s.schoolName || '',
        s.grade || '',
        subjects,
        amount.total,
        `${paidCount}/12`,
        yearSum,
        unpaidMonths.join(', ') || '-',
      ]);
    });
    
    const ws2 = window.XLSX.utils.aoa_to_sheet(sheet2Data);
    ws2['!cols'] = [
      { wch: 10 }, { wch: 14 }, { wch: 8 }, { wch: 30 },
      { wch: 12 }, { wch: 12 }, { wch: 14 }, { wch: 20 },
    ];
    window.XLSX.utils.book_append_sheet(wb, ws2, '학생별 연간 이력');
    
    // ─── 시트 3: 월별 요약 통계 ───
    const sheet3Data = [];
    sheet3Data.push([`${selectedYear}년 월별 요약`]);
    sheet3Data.push([]);
    sheet3Data.push(['월', '재원생 수', '납부 완료', '미납자 수', '납부율 (%)', '총 수입']);
    
    monthlyStats.forEach(m => {
      const rate = m.totalStudents > 0 ? ((m.paidCount / m.totalStudents) * 100).toFixed(1) : 0;
      sheet3Data.push([
        `${m.month}월`,
        m.totalStudents,
        m.paidCount,
        m.unpaidCount,
        `${rate}%`,
        m.paidAmount,
      ]);
    });
    
    sheet3Data.push([]);
    sheet3Data.push(['연간 합계', '', '', '', '', yearTotal]);
    
    const ws3 = window.XLSX.utils.aoa_to_sheet(sheet3Data);
    ws3['!cols'] = [
      { wch: 10 }, { wch: 12 }, { wch: 12 }, { wch: 12 }, { wch: 12 }, { wch: 16 },
    ];
    // 제목 셀 병합
    ws3['!merges'] = [{ s: { r: 0, c: 0 }, e: { r: 0, c: 5 } }];
    window.XLSX.utils.book_append_sheet(wb, ws3, '월별 요약');
    
    // 파일 다운로드
    const academyName = (settings.academyName || '학원').replace(/\s+/g, '');
    const filename = `${academyName}_${selectedYear}년_결제내역_${new Date().toISOString().slice(0,10)}.xlsx`;
    window.XLSX.writeFile(wb, filename);
  };
  
  // 연도 목록 (현재 연도 기준 -2년 ~ +1년)
  const yearOptions = [];
  for (let y = currentYear - 2; y <= currentYear + 1; y++) {
    yearOptions.push(y);
  }
  
  return (
    <div className="space-y-4">
      {/* 헤더 */}
      <div className="bg-white rounded-lg shadow p-5">
        <div className="flex items-center justify-between flex-wrap gap-3">
          <div>
            <h2 className="text-lg font-bold text-gray-800">📊 통계·리포트</h2>
            <p className="text-xs text-gray-500 mt-1">
              재원생 {activeStudents.length}명
              {withdrawnStudents.length > 0 && ` · 퇴원생 ${withdrawnStudents.length}명 제외`}
            </p>
          </div>
          <div className="flex items-center gap-2">
            <label className="text-sm text-gray-600">연도:</label>
            <select
              value={selectedYear}
              onChange={(e) => setSelectedYear(Number(e.target.value))}
              className="border rounded px-3 py-1.5 text-sm"
            >
              {yearOptions.map(y => (
                <option key={y} value={y}>{y}년</option>
              ))}
            </select>
            <button
              onClick={downloadExcel}
              className="px-4 py-2 bg-green-600 text-white rounded font-semibold text-sm hover:bg-green-700 shadow"
              title="월별 결제내역을 엑셀 파일로 다운로드"
            >
              📥 엑셀 다운로드
            </button>
          </div>
        </div>
      </div>
      
      {/* 요약 카드 */}
      {(() => {
        const yearBilled = monthlyStats.reduce((s, m) => s + m.billedAmount, 0);
        const yearUnpaid = yearBilled - yearTotal;
        return (
          <>
            <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
              <div className="bg-white rounded-lg shadow p-4">
                <div className="text-xs text-gray-500 mb-1">재원생</div>
                <div className="text-2xl font-bold text-gray-800">{maskNum(activeStudents.length, '명')}</div>
              </div>
              <div className="bg-white rounded-lg shadow p-4 border-l-4 border-gray-400">
                <div className="text-xs text-gray-500 mb-1">{selectedYear}년 총 청구액 (받아야 할 돈)</div>
                <div className="text-2xl font-bold text-gray-800">{mask(yearBilled, '원')}</div>
              </div>
              <div className="bg-white rounded-lg shadow p-4 border-l-4 border-indigo-400">
                <div className="text-xs text-gray-500 mb-1">{selectedYear}년 실 납부액 (받은 돈)</div>
                <div className="text-2xl font-bold text-indigo-600">{mask(yearTotal, '원')}</div>
              </div>
              <div className="bg-white rounded-lg shadow p-4 border-l-4 border-rose-400">
                <div className="text-xs text-gray-500 mb-1">{selectedYear}년 미납액 (못 받은 돈)</div>
                <div className="text-2xl font-bold text-rose-600">{mask(yearUnpaid, '원')}</div>
              </div>
            </div>
            
            {/* 교습비/교재비 분리 카드 (실 납부 기준) */}
            <div className="grid grid-cols-2 gap-3">
              <div className="bg-white rounded-lg shadow p-4 border-l-4 border-blue-400">
                <div className="text-xs text-gray-500 mb-1">{selectedYear}년 교습비 실수입</div>
                <div className="text-xl font-bold text-blue-600">{mask(yearTuitionTotal, '원')}</div>
              </div>
              <div className="bg-white rounded-lg shadow p-4 border-l-4 border-amber-400">
                <div className="text-xs text-gray-500 mb-1">{selectedYear}년 교재비 실수입</div>
                <div className="text-xl font-bold text-amber-600">{mask(yearMaterialTotal, '원')}</div>
              </div>
            </div>
          </>
        );
      })()}
      
      {/* 차트 */}
      <div className="bg-white rounded-lg shadow p-5">
        <h3 className="font-semibold text-gray-800 mb-3">📈 {selectedYear}년 월별 수입 그래프</h3>
        <div style={{ height: '300px' }}>
          <canvas ref={chartRef}></canvas>
        </div>
      </div>
      
      {/* 월별 상세 테이블 */}
      <div className="bg-white rounded-lg shadow p-5">
        <h3 className="font-semibold text-gray-800 mb-3">📋 {selectedYear}년 월별 상세</h3>
        <p className="text-[11px] text-gray-500 mb-2">
          💡 <strong className="text-gray-700">총 청구액</strong> = 재원생 전체가 내야 할 금액 (매출 목표) · <strong className="text-indigo-700">실 납부액</strong> = 실제 납부 완료된 금액
        </p>
        <div className="overflow-x-auto">
          <table className="w-full text-sm">
            <thead>
              <tr className="border-b-2 border-gray-200 text-left text-gray-600">
                <th className="py-2 px-2">월</th>
                <th className="py-2 px-2 text-right">재원생</th>
                <th className="py-2 px-2 text-right">납부</th>
                <th className="py-2 px-2 text-right">미납</th>
                <th className="py-2 px-2 text-right bg-gray-50">총 교습비</th>
                <th className="py-2 px-2 text-right bg-gray-50">총 교재비</th>
                <th className="py-2 px-2 text-right bg-gray-50 font-bold">총 청구액</th>
                <th className="py-2 px-2 text-right bg-indigo-50 font-bold">실 납부액</th>
                <th className="py-2 px-2 text-right bg-rose-50">미납액</th>
              </tr>
            </thead>
            <tbody>
              {monthlyStats.map(m => {
                const unpaidAmount = m.billedAmount - m.paidAmount;
                return (
                  <tr key={m.month} className="border-b border-gray-100 hover:bg-gray-50">
                    <td className="py-2 px-2 font-medium">{m.month}월</td>
                    <td className="py-2 px-2 text-right">{m.totalStudents}명</td>
                    <td className="py-2 px-2 text-right text-emerald-600 font-medium">{m.paidCount}명</td>
                    <td className="py-2 px-2 text-right text-rose-600">{m.unpaidCount}명</td>
                    <td className="py-2 px-2 text-right text-gray-600 bg-gray-50/50">{mask(m.billedTuition)}</td>
                    <td className="py-2 px-2 text-right text-gray-600 bg-gray-50/50">{mask(m.billedMaterial)}</td>
                    <td className="py-2 px-2 text-right font-bold text-gray-800 bg-gray-50/50">{mask(m.billedAmount)}</td>
                    <td className="py-2 px-2 text-right font-bold text-indigo-700 bg-indigo-50/50">{mask(m.paidAmount)}</td>
                    <td className="py-2 px-2 text-right text-rose-500 bg-rose-50/50">{mask(unpaidAmount)}</td>
                  </tr>
                );
              })}
              {(() => {
                const yearBilledTuition = monthlyStats.reduce((s, m) => s + m.billedTuition, 0);
                const yearBilledMaterial = monthlyStats.reduce((s, m) => s + m.billedMaterial, 0);
                const yearBilled = yearBilledTuition + yearBilledMaterial;
                const yearUnpaid = yearBilled - yearTotal;
                return (
                  <tr className="border-t-2 border-gray-300 bg-gray-50 font-bold">
                    <td className="py-3 px-2">연간 합계</td>
                    <td></td><td></td><td></td>
                    <td className="py-3 px-2 text-right text-blue-700">{mask(yearBilledTuition)}</td>
                    <td className="py-3 px-2 text-right text-amber-700">{mask(yearBilledMaterial)}</td>
                    <td className="py-3 px-2 text-right text-gray-800">{mask(yearBilled)}</td>
                    <td className="py-3 px-2 text-right text-indigo-700">{mask(yearTotal)}</td>
                    <td className="py-3 px-2 text-right text-rose-600">{mask(yearUnpaid)}</td>
                  </tr>
                );
              })()}
            </tbody>
          </table>
        </div>
      </div>
      
      {/* 주기 이력 기반 월별 청구 통계 */}
      {(() => {
        // 모든 학생의 cycleHistory를 월별로 집계
        const monthlyMap = {};
        students.forEach(s => {
          (s.cycleHistory || []).forEach(h => {
            // yearMonth가 있으면 그걸로, 없으면 savedDate의 연-월로
            const key = h.yearMonth || (h.savedDate ? h.savedDate.substring(0, 7) : '미상');
            if (!monthlyMap[key]) {
              monthlyMap[key] = { count: 0, totalAmount: 0, paidAmount: 0, paidCount: 0 };
            }
            monthlyMap[key].count += 1;
            monthlyMap[key].totalAmount += (h.totalAmount || 0);
            if (h.payment?.status === 'paid') {
              monthlyMap[key].paidAmount += (h.totalAmount || 0);
              monthlyMap[key].paidCount += 1;
            }
          });
        });
        const monthKeys = Object.keys(monthlyMap).sort().reverse();
        
        if (monthKeys.length === 0) return null;
        
        return (
          <div className="bg-white rounded-lg shadow p-5">
            <h3 className="font-semibold text-gray-800 mb-1">📚 주기 이력 기반 월별 청구 통계</h3>
            <p className="text-xs text-gray-500 mb-3">
              "다음 주기로" 이동 시 저장된 이력을 월별로 집계합니다.
            </p>
            <div className="overflow-x-auto">
              <table className="w-full text-sm">
                <thead>
                  <tr className="border-b-2 border-gray-200 text-left text-gray-600">
                    <th className="py-2 px-2">청구 월</th>
                    <th className="py-2 px-2 text-right">총 학생수</th>
                    <th className="py-2 px-2 text-right">총 청구액</th>
                    <th className="py-2 px-2 text-right">납부 완료</th>
                    <th className="py-2 px-2 text-right">실수입</th>
                  </tr>
                </thead>
                <tbody>
                  {monthKeys.map(k => {
                    const m = monthlyMap[k];
                    return (
                      <tr key={k} className="border-b border-gray-100 hover:bg-gray-50">
                        <td className="py-2 px-2 font-medium">{k}</td>
                        <td className="py-2 px-2 text-right">{m.count}명</td>
                        <td className="py-2 px-2 text-right font-semibold">{m.totalAmount.toLocaleString()}원</td>
                        <td className="py-2 px-2 text-right text-emerald-600">{m.paidCount}명</td>
                        <td className="py-2 px-2 text-right font-semibold text-indigo-700">{m.paidAmount.toLocaleString()}원</td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          </div>
        );
      })()}
      
      {/* 퇴원생 목록 */}
      {withdrawnStudents.length > 0 && (
        <div className="bg-gray-50 rounded-lg border border-gray-300 p-5">
          <h3 className="font-semibold text-gray-700 mb-2">🚪 퇴원 학생 ({withdrawnStudents.length}명)</h3>
          <p className="text-xs text-gray-500 mb-3">퇴원 학생은 모든 통계에서 제외됩니다.</p>
          <div className="flex flex-wrap gap-2">
            {withdrawnStudents.map(s => (
              <span key={s.id} className="px-3 py-1 bg-white border border-gray-300 rounded text-xs text-gray-600">
                {s.name}{s.withdrawnDate ? ` (${s.withdrawnDate})` : ''}
              </span>
            ))}
          </div>
        </div>
      )}
      
      {/* 휴원생 목록 */}
      {suspendedStudents.length > 0 && (
        <div className="bg-amber-50 rounded-lg border border-amber-300 p-5">
          <h3 className="font-semibold text-amber-800 mb-2">🏖️ 휴원 학생 ({suspendedStudents.length}명)</h3>
          <p className="text-xs text-amber-600 mb-3">휴원 학생은 청구·통계에서 제외됩니다. (복귀 예정)</p>
          <div className="flex flex-wrap gap-2">
            {suspendedStudents.map(s => (
              <span key={s.id} className="px-3 py-1 bg-white border border-amber-300 rounded text-xs text-amber-700">
                {s.name}
                {(s.suspendStart || s.suspendEnd) && (
                  <span className="text-amber-500"> ({s.suspendStart || '?'} ~ {s.suspendEnd || '?'})</span>
                )}
              </span>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

// ═══════════════════════════════════════════════════
//  6.6. 공지사항 탭 (월별 공지문 생성기)
// ═══════════════════════════════════════════════════

function NoticeTab({ settings }) {
  const noticeRef = React.useRef(null);
  const [exporting, setExporting] = useState(false);
  
  // 공지사항 데이터 (localStorage에 저장)
  const [notice, setNotice] = useState(() => {
    const saved = localStorage.getItem('academy_notice');
    if (saved) {
      try { return JSON.parse(saved); }
      catch { /* ignore */ }
    }
    return {
      title: '5월 공지사항',
      subtitle: '아래 사항을 안내드립니다',
      date: formatDateStr(new Date()),
      items: [
        { icon: '📅', title: '휴원 안내', content: '5월 5일(어린이날), 5월 6일(대체공휴일) 휴원합니다.' },
        { icon: '📚', title: '특강 안내', content: '5월 중간고사 대비 특강을 진행합니다.\n자세한 사항은 별도 안내드리겠습니다.' },
      ],
      footer: '항상 믿고 맡겨주셔서 감사합니다. 😊',
    };
  });
  
  // 자동 저장
  React.useEffect(() => {
    localStorage.setItem('academy_notice', JSON.stringify(notice));
  }, [notice]);
  
  const updateField = (k, v) => setNotice({ ...notice, [k]: v });
  
  const addItem = () => setNotice({
    ...notice,
    items: [...notice.items, { icon: '📌', title: '', content: '' }],
  });
  
  const updateItem = (idx, k, v) => {
    const items = [...notice.items];
    items[idx] = { ...items[idx], [k]: v };
    setNotice({ ...notice, items });
  };
  
  const removeItem = (idx) => {
    setNotice({ ...notice, items: notice.items.filter((_, i) => i !== idx) });
  };
  
  const ICONS = ['📅', '📚', '🎉', '⚠️', '📌', '🏫', '✏️', '💡', '🌸', '☀️', '🍂', '❄️', '🎄', '🎊'];
  
  // PNG 저장
  const exportPNG = async () => {
    if (!noticeRef.current) return;
    setExporting(true);
    try {
      const el = noticeRef.current;
      const themeNavy = getComputedStyle(document.documentElement).getPropertyValue('--theme-navy').trim() || '#1a2344';
      let dataUrl;
      if (window.modernScreenshot) {
        dataUrl = await window.modernScreenshot.domToPng(el, {
          backgroundColor: themeNavy,
          scale: 2,
        });
      } else {
        const canvas = await window.html2canvas(el, {
          backgroundColor: themeNavy,
          scale: 2,
          useCORS: true,
        });
        dataUrl = canvas.toDataURL('image/png');
      }
      const link = document.createElement('a');
      link.download = `${(settings.academyName || '학원').replace(/\s+/g, '')}_공지사항_${formatDateStr(new Date())}.png`;
      link.href = dataUrl;
      link.click();
    } catch (e) {
      console.error(e);
      alert('PNG 저장 중 오류 발생');
    } finally {
      setExporting(false);
    }
  };
  
  // PDF 저장 (브라우저 인쇄)
  const exportPDF = () => {
    if (!noticeRef.current) return;
    const el = noticeRef.current;
    const originalTitle = document.title;
    document.title = `${(settings.academyName || '학원').replace(/\s+/g, '')}_공지사항_${formatDateStr(new Date())}`;
    el.classList.add('print-target');
    setTimeout(() => {
      window.print();
      setTimeout(() => {
        el.classList.remove('print-target');
        document.title = originalTitle;
      }, 500);
    }, 100);
  };
  
  return (
    <div className="grid grid-cols-1 lg:grid-cols-[1fr_580px] gap-4">
      {/* 왼쪽: 편집 영역 */}
      <div className="space-y-3">
        <div className="bg-white rounded-lg shadow p-4">
          <h2 className="text-lg font-bold text-gray-800 mb-3">📢 공지사항 작성</h2>
          
          <div className="space-y-3">
            <div>
              <label className="block text-xs font-semibold text-gray-700 mb-1">제목</label>
              <input
                type="text"
                value={notice.title}
                onChange={(e) => updateField('title', e.target.value)}
                className="w-full px-3 py-2 border rounded text-sm"
                placeholder="예: 5월 공지사항"
              />
            </div>
            
            <div>
              <label className="block text-xs font-semibold text-gray-700 mb-1">부제목 (선택)</label>
              <input
                type="text"
                value={notice.subtitle}
                onChange={(e) => updateField('subtitle', e.target.value)}
                className="w-full px-3 py-2 border rounded text-sm"
                placeholder="예: 아래 사항을 안내드립니다"
              />
            </div>
            
            <div>
              <label className="block text-xs font-semibold text-gray-700 mb-1">날짜</label>
              <input
                type="date"
                value={notice.date}
                onChange={(e) => updateField('date', e.target.value)}
                className="px-3 py-2 border rounded text-sm"
              />
            </div>
          </div>
        </div>
        
        {/* 공지 항목들 */}
        <div className="bg-white rounded-lg shadow p-4">
          <div className="flex items-center justify-between mb-3">
            <h3 className="font-semibold text-gray-800">📋 공지 항목 ({notice.items.length})</h3>
            <button
              onClick={addItem}
              className="px-3 py-1 bg-blue-600 text-white text-xs rounded font-semibold hover:bg-blue-700"
            >
              + 항목 추가
            </button>
          </div>
          
          <div className="space-y-3">
            {notice.items.map((item, idx) => (
              <div key={idx} className="border-2 border-gray-200 rounded-lg p-3 bg-gray-50">
                <div className="flex items-center gap-2 mb-2">
                  <select
                    value={item.icon}
                    onChange={(e) => updateItem(idx, 'icon', e.target.value)}
                    className="px-2 py-1 border rounded text-sm bg-white"
                  >
                    {ICONS.map(ic => <option key={ic} value={ic}>{ic}</option>)}
                  </select>
                  <input
                    type="text"
                    value={item.title}
                    onChange={(e) => updateItem(idx, 'title', e.target.value)}
                    placeholder="항목 제목 (예: 휴원 안내)"
                    className="flex-1 px-2 py-1 border rounded text-sm font-semibold"
                  />
                  <button
                    onClick={() => removeItem(idx)}
                    className="px-2 py-1 text-red-600 hover:bg-red-50 rounded text-xs"
                    title="이 항목 삭제"
                  >
                    🗑️
                  </button>
                </div>
                <textarea
                  value={item.content}
                  onChange={(e) => updateItem(idx, 'content', e.target.value)}
                  placeholder="내용 입력... (줄바꿈 가능)"
                  rows="3"
                  className="w-full px-2 py-1.5 border rounded text-sm"
                />
              </div>
            ))}
            
            {notice.items.length === 0 && (
              <div className="text-center text-gray-400 text-sm py-4">
                항목을 추가해주세요
              </div>
            )}
          </div>
        </div>
        
        <div className="bg-white rounded-lg shadow p-4">
          <label className="block text-xs font-semibold text-gray-700 mb-1">맺음말 (선택)</label>
          <textarea
            value={notice.footer}
            onChange={(e) => updateField('footer', e.target.value)}
            rows="2"
            className="w-full px-3 py-2 border rounded text-sm"
            placeholder="예: 항상 믿고 맡겨주셔서 감사합니다 😊"
          />
        </div>
        
        {/* 저장 버튼 */}
        <div className="bg-white rounded-lg shadow p-4">
          <div className="flex gap-2 flex-wrap">
            <button
              onClick={exportPDF}
              className="flex-1 px-4 py-2 bg-purple-600 text-white rounded text-sm font-bold hover:bg-purple-700 shadow"
              title="브라우저 인쇄로 PDF 저장"
            >
              📄 PDF 저장
            </button>
            <button
              onClick={exportPNG}
              disabled={exporting}
              className="flex-1 px-4 py-2 bg-blue-600 text-white rounded text-sm font-bold hover:bg-blue-700 disabled:bg-gray-400 shadow"
            >
              {exporting ? '저장 중...' : '🖼️ PNG 저장 (카톡용)'}
            </button>
          </div>
          <p className="text-[11px] text-gray-500 mt-2 text-center">
            💡 카톡 전송은 <strong>PNG</strong> 또는 <strong>화면 캡처</strong>(Win+Shift+S)를 권장합니다
          </p>
        </div>
      </div>
      
      {/* 오른쪽: 미리보기 */}
      <div className="lg:sticky lg:top-4 lg:self-start">
        <h3 className="text-sm font-semibold text-gray-600 mb-2">📱 미리보기</h3>
        <div className="flex justify-center">
          <NoticeView notice={notice} settings={settings} noticeRef={noticeRef} />
        </div>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════
//  6.7. 수강 원칙 탭 (학원 정책 이미지 보관·전송)
// ═══════════════════════════════════════════════════

function PolicyTab({ settings }) {
  // 수강 원칙 이미지 데이터 (localStorage에 base64로 저장)
  const [policies, setPolicies] = useState(() => {
    const saved = localStorage.getItem('academy_policies');
    if (saved) {
      try { return JSON.parse(saved); }
      catch { /* ignore */ }
    }
    return []; // [{ id, name, dataUrl, addedDate }]
  });
  
  // 자동 저장
  React.useEffect(() => {
    try {
      localStorage.setItem('academy_policies', JSON.stringify(policies));
    } catch (e) {
      alert('저장 실패: 이미지 용량이 너무 큽니다. 더 작은 이미지를 사용해주세요.');
    }
  }, [policies]);
  
  const fileInputRef = React.useRef(null);
  
  // 이미지 추가
  const handleFileSelect = (e) => {
    const files = Array.from(e.target.files);
    if (files.length === 0) return;
    
    const newPolicies = [...policies];
    let remaining = files.length;
    
    files.forEach((file, idx) => {
      if (!file.type.startsWith('image/')) {
        alert(`${file.name}: 이미지 파일만 추가할 수 있습니다`);
        remaining--;
        if (remaining === 0) e.target.value = '';
        return;
      }
      
      const reader = new FileReader();
      reader.onload = (ev) => {
        newPolicies.push({
          id: uid(),
          name: file.name,
          dataUrl: ev.target.result,
          addedDate: formatDateStr(new Date()),
        });
        remaining--;
        if (remaining === 0) {
          setPolicies(newPolicies);
          e.target.value = '';
        }
      };
      reader.readAsDataURL(file);
    });
  };
  
  // 이미지 삭제
  const handleRemove = (id) => {
    if (!confirm('이 이미지를 삭제하시겠습니까?')) return;
    setPolicies(policies.filter(p => p.id !== id));
  };
  
  // 순서 변경
  const moveUp = (idx) => {
    if (idx === 0) return;
    const arr = [...policies];
    [arr[idx - 1], arr[idx]] = [arr[idx], arr[idx - 1]];
    setPolicies(arr);
  };
  
  const moveDown = (idx) => {
    if (idx === policies.length - 1) return;
    const arr = [...policies];
    [arr[idx], arr[idx + 1]] = [arr[idx + 1], arr[idx]];
    setPolicies(arr);
  };
  
  // 이미지 이름 변경
  const renamePolicy = (id, newName) => {
    setPolicies(policies.map(p => p.id === id ? { ...p, name: newName } : p));
  };
  
  // 단일 다운로드
  const downloadOne = (policy) => {
    const link = document.createElement('a');
    link.download = policy.name;
    link.href = policy.dataUrl;
    link.click();
  };
  
  // 전체 ZIP 다운로드
  const downloadZip = async () => {
    if (policies.length === 0) {
      alert('다운로드할 이미지가 없습니다');
      return;
    }
    if (!window.JSZip) {
      alert('압축 라이브러리 로드 실패. 페이지를 새로고침해주세요.');
      return;
    }
    
    const zip = new window.JSZip();
    const academy = (settings.academyName || '학원').replace(/\s+/g, '');
    
    for (let i = 0; i < policies.length; i++) {
      const p = policies[i];
      // base64 dataUrl → blob
      const res = await fetch(p.dataUrl);
      const blob = await res.blob();
      const ext = p.dataUrl.match(/data:image\/(\w+);/)?.[1] || 'png';
      const num = String(i + 1).padStart(2, '0');
      zip.file(`${num}_${p.name.replace(/\.[^.]+$/, '')}.${ext}`, blob);
    }
    
    const content = await zip.generateAsync({ type: 'blob' });
    const link = document.createElement('a');
    link.download = `${academy}_수강원칙_${formatDateStr(new Date())}.zip`;
    link.href = URL.createObjectURL(content);
    link.click();
  };
  
  // 클립보드 복사 (단일)
  const copyToClipboard = async (policy) => {
    try {
      const res = await fetch(policy.dataUrl);
      const blob = await res.blob();
      await navigator.clipboard.write([
        new ClipboardItem({ [blob.type]: blob }),
      ]);
      alert('✅ 클립보드에 복사되었습니다.\n카톡 채팅창에서 Ctrl+V로 붙여넣기 가능!');
    } catch (e) {
      alert('클립보드 복사 실패. 다운로드 후 사용해주세요.');
    }
  };
  
  return (
    <div className="space-y-4">
      {/* 헤더 */}
      <div className="bg-white rounded-lg shadow p-5">
        <div className="flex items-center justify-between flex-wrap gap-3">
          <div>
            <h2 className="text-lg font-bold text-gray-800">📜 수강 원칙 안내문</h2>

              학원 수강 정책 이미지를 영구 보관합니다. 등록된 이미지 {policies.length}장
            </p>
          </div>
          <div className="flex gap-2">
            <button
              onClick={() => fileInputRef.current?.click()}
              className="px-4 py-2 bg-blue-600 text-white rounded text-sm font-bold hover:bg-blue-700 shadow"
            >
              + 이미지 추가
            </button>
            <button
              onClick={downloadZip}
              disabled={policies.length === 0}
              className="px-4 py-2 bg-green-600 text-white rounded text-sm font-bold hover:bg-green-700 disabled:bg-gray-300 shadow"
            >
              📦 전체 ZIP
            </button>
          </div>
        </div>
        <input
          ref={fileInputRef}
          type="file"
          accept="image/*"
          multiple
          onChange={handleFileSelect}
          className="hidden"
        />
      </div>
      
      {/* 이미지 없음 안내 */}
      {policies.length === 0 && (
        <div className="bg-white rounded-lg shadow p-10 text-center">
          <div className="text-6xl mb-3">📜</div>
          <h3 className="font-bold text-gray-700 mb-2">수강 원칙 이미지를 추가해주세요</h3>
          <p className="text-sm text-gray-500 mb-4">

            여기에 등록해두면 언제든 학부모께 전송하실 수 있습니다.
          </p>
          <button
            onClick={() => fileInputRef.current?.click()}
            className="px-6 py-2 bg-blue-600 text-white rounded font-bold hover:bg-blue-700"

            + 첫 이미지 추가하기
          </button>
        </div>
      )}
      
      {/* 이미지 목록 */}
      {policies.length > 0 && (
        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
          {policies.map((p, idx) => (
            <div key={p.id} className="bg-white rounded-lg shadow overflow-hidden">
              {/* 이미지 미리보기 */}
              <div className="relative bg-gray-100" style={{ paddingTop: '100%' }}>
                <img

              <div className="p-3 space-y-2">

function PaymentTab({ students, setStudents, privacyMode }) {
  const pmask = (val, suffix = '') => privacyMode ? '•••' : `${val.toLocaleString()}${suffix}`;
  const [yearMonth, setYearMonth] = useState(() => {
    const d = new Date();
    return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
  });
  const [filter, setFilter] = useState('all');
  const [search, setSearch] = useState('');

  const getPayment = (s) => (s.payments && s.payments[yearMonth]) || { status: 'pending', paidDate: '', note: '' };
  const getAmount = (s) => (s.subjects || []).reduce((a, x) => a + (x.tuition || 0), 0) + (s.materials || []).reduce((a, x) => a + (x.amount || 0), 0);

  const updatePayment = (studentId, patch) => {
    setStudents(students.map(s => {
      if (s.id !== studentId) return s;
      const current = getPayment(s);
      return {
        ...s,
        payments: {
          ...(s.payments || {}),
          [yearMonth]: { ...current, ...patch },
        },
      };
    }));
  };

  const togglePaid = (s) => {
    const current = getPayment(s);
    const isPaid = current.status === 'paid';
    updatePayment(s.id, {
      status: isPaid ? 'pending' : 'paid',
      paidDate: isPaid ? '' : formatDateStr(new Date()),
    });
  };

  const markAllPaid = () => {
    if (!confirm(`${yearMonth} 기준으로 표시된 학생 전원을 납부완료로 변경합니다. 진행하시겠습니까?`)) return;
    const today = formatDateStr(new Date());
    setStudents(students.map(s => {
      if (!filtered.some(f => f.id === s.id)) return s;
      return {
        ...s,
        payments: {
          ...(s.payments || {}),
          [yearMonth]: { status: 'paid', paidDate: today, note: getPayment(s).note || '' },
        },
      };
    }));
  };

  // 재원생만 대상 (퇴원·휴원생은 납부 대상 아님)
  const activeStudents = students.filter(s => !s.isWithdrawn && !s.isSuspended);

  const filtered = sortStudentsByName(activeStudents.filter(s => {
    if (search && !s.name.includes(search)) return false;
    const p = getPayment(s);
    if (filter === 'paid') return p.status === 'paid';
    if (filter === 'unpaid') return p.status !== 'paid';
    return true;
  }));

  const paidCount = activeStudents.filter(s => getPayment(s).status === 'paid').length;
  const unpaidCount = activeStudents.length - paidCount;
  const totalAmount = activeStudents.reduce((sum, s) => sum + getAmount(s), 0);
  const paidAmount = activeStudents.filter(s => getPayment(s).status === 'paid').reduce((sum, s) => sum + getAmount(s), 0);
  const unpaidAmount = totalAmount - paidAmount;

  const copyUnpaidList = () => {
    const unpaid = sortStudentsByName(activeStudents.filter(s => getPayment(s).status !== 'paid'));
    if (unpaid.length === 0) { alert('미납자 없음'); return; }
    const text = unpaid.map(s => `${s.name} - ${fmtWon(getAmount(s))}`).join('\n');
    if (navigator.clipboard) {
      navigator.clipboard.writeText(text).then(() => alert(`미납자 ${unpaid.length}명 목록이 클립보드에 복사되었습니다`));
    } else {
      alert(text);
    }
  };

  return (
    <div className="space-y-4">
      {/* 필터·검색 */}
      <div className="bg-white border rounded-lg p-4 flex gap-3 items-end flex-wrap">
        <div>
          <label className="block text-[11px] text-gray-500 mb-0.5">납부 대상 월</label>
          <input type="month" value={yearMonth} onChange={(e) => setYearMonth(e.target.value)} className="px-3 py-1.5 border rounded text-sm" />
        </div>
        <div>
          <label className="block text-[11px] text-gray-500 mb-0.5">검색</label>
          <input type="text" value={search} onChange={(e) => setSearch(e.target.value)} placeholder="학생 이름..." className="px-3 py-1.5 border rounded text-sm" />
        </div>
        <div>
          <label className="block text-[11px] text-gray-500 mb-0.5">필터</label>
          <div className="flex gap-1">
            {[['all', '전체'], ['paid', '✓ 납부완료'], ['unpaid', '⚠ 미납']].map(([k, l]) => (
              <button key={k} onClick={() => setFilter(k)} className={`px-3 py-1.5 rounded text-xs font-semibold transition ${filter === k ? 'invoice-navy text-white' : 'bg-gray-100 text-gray-700 hover:bg-gray-200'}`}>
                {l}
              </button>
            ))}
          </div>
        </div>
        <div className="flex-1"></div>
        <div className="flex gap-1">
          <button onClick={copyUnpaidList} className="px-3 py-1.5 bg-orange-500 text-white rounded text-xs font-semibold hover:bg-orange-600">📋 미납자 목록 복사</button>
          <button onClick={markAllPaid} className="px-3 py-1.5 bg-green-600 text-white rounded text-xs font-semibold hover:bg-green-700">✓ 표시된 전원 납부완료</button>
        </div>
      </div>

      {/* 통계 */}
      <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
        <StatCard title="전체 학생" value={privacyMode ? '••• ' : `${students.length}명`} color="blue" />
        <StatCard title="납부 완료" value={privacyMode ? '•••' : `${paidCount}명 · ${fmtWon(paidAmount)}`} color="green" />
        <StatCard title="미납" value={privacyMode ? '•••' : `${unpaidCount}명 · ${fmtWon(unpaidAmount)}`} color="red" />
        <StatCard title="납부율" value={`${students.length === 0 ? 0 : Math.round((paidCount / students.length) * 100)}%`} color="orange" />
      </div>

      {/* 학생 목록 */}
      <div className="bg-white rounded-lg border overflow-hidden">
        <table className="w-full text-sm">
          <thead className="bg-gray-50 border-b">
            <tr>
              <th className="px-3 py-2 text-left font-semibold text-gray-700">학생</th>
              <th className="px-3 py-2 text-right font-semibold text-gray-700">납부액</th>
              <th className="px-3 py-2 text-center font-semibold text-gray-700">상태</th>
              <th className="px-3 py-2 text-center font-semibold text-gray-700">납부일</th>
              <th className="px-3 py-2 text-left font-semibold text-gray-700">메모</th>
            </tr>
          </thead>
          <tbody>
            {filtered.length === 0 && (
              <tr><td colSpan="5" className="px-3 py-8 text-center text-gray-400">해당 조건의 학생이 없습니다</td></tr>
            )}
            {filtered.map((s) => {
              const p = getPayment(s);
              const amount = getAmount(s);
              const isPaid = p.status === 'paid';
              return (
                <tr key={s.id} className={`border-b ${isPaid ? 'bg-green-50/40' : ''}`}>
                  <td className="px-3 py-2 font-semibold text-gray-800">{s.name}</td>
                  <td className="px-3 py-2 text-right font-medium text-gray-700">{fmtWon(amount)}</td>
                  <td className="px-3 py-2 text-center">
                    <button onClick={() => togglePaid(s)} className={`px-3 py-1 rounded text-xs font-bold transition ${isPaid ? 'bg-green-600 text-white' : 'bg-red-100 text-red-700 border border-red-300 hover:bg-red-200'}`}>
                      {isPaid ? '✓ 납부완료' : '미납'}
                    </button>
                  </td>
                  <td className="px-3 py-2 text-center">
                    <input type="date" value={p.paidDate || ''} onChange={(e) => updatePayment(s.id, { paidDate: e.target.value })} className="text-xs px-1.5 py-0.5 border rounded" />
                  </td>
                  <td className="px-3 py-2">
                    <input type="text" value={p.note || ''} onChange={(e) => updatePayment(s.id, { note: e.target.value })} placeholder="메모 (선택)" className="w-full px-2 py-1 text-xs border rounded" />
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════
//  8. 메인 앱
// ═══════════════════════════════════════════════════

function App() {
  const [tab, setTab] = useState('invoices');
  const [privacyMode, setPrivacyMode] = useState(() => {
    try {
      return storage.get('tuition_privacy') === 'true';
    } catch { return false; }
  });
  // 프라이버시 모드 저장
  useEffect(() => {
    try { storage.set('tuition_privacy', privacyMode ? 'true' : 'false'); } catch {}
  }, [privacyMode]);
  const [students, setStudents] = useState(() => {
    try {
      const s = storage.get('tuition_students');
      if (s) return JSON.parse(s);
    } catch {}
    return [SAMPLE_STUDENT];
  });
  const [settings, setSettings] = useState(() => {
    try {
      const s = storage.get('tuition_settings');
      if (s) return { ...DEFAULT_SETTINGS, ...JSON.parse(s) };
    } catch {}
    return DEFAULT_SETTINGS;
  });
  const [selectedId, setSelectedId] = useState(students[0]?.id || null);
  const [editingStudent, setEditingStudent] = useState(null);
  const [showForm, setShowForm] = useState(false);
  const [showBulkImport, setShowBulkImport] = useState(false);
  const [backupReminder, setBackupReminder] = useState(null); // null | {daysSinceBackup}

  useEffect(() => { storage.set('tuition_students', JSON.stringify(students)); }, [students]);
  useEffect(() => { storage.set('tuition_settings', JSON.stringify(settings)); }, [settings]);
  
  // 색상 테마 적용 (settings.colorTheme 변경 시)
  useEffect(() => {
    applyColorTheme(settings.colorTheme || 'navy');
  }, [settings.colorTheme]);

  // 자동 백업 알림 체크 (앱 시작 시 1회)
  useEffect(() => {
    // 학생 데이터 없으면 알림 안 띄움
    if (students.length === 0) return;

    // 스누즈 확인
    const snoozeUntil = storage.get('tuition_backup_snooze_until');
    if (snoozeUntil && new Date(snoozeUntil) > new Date()) return;

    const lastBackup = storage.get('tuition_last_backup_at');
    if (!lastBackup) {
      // 한 번도 백업 안 했는데 학생은 있음 → 알림
      setBackupReminder({ daysSinceBackup: null });
      return;
    }

    const daysAgo = Math.floor((Date.now() - new Date(lastBackup).getTime()) / (1000 * 60 * 60 * 24));
    if (daysAgo >= 7) {
      setBackupReminder({ daysSinceBackup: daysAgo });
    }
  }, []); // 앱 마운트 시 1회만 실행

  const handleAddStudent = () => { setEditingStudent(null); setShowForm(true); };
  const handleEditStudent = (id) => { setEditingStudent(students.find(s => s.id === id)); setShowForm(true); };
  const handleDeleteStudent = (id) => {
    setStudents(students.filter(s => s.id !== id));
    if (selectedId === id) setSelectedId(students.find(s => s.id !== id)?.id || null);
  };
  const handleDuplicateStudent = (id) => {
    const orig = students.find(s => s.id === id);
    if (!orig) return;
    const copy = JSON.parse(JSON.stringify(orig));
    copy.id = uid();
    copy.name = orig.name + ' (복사)';
    copy.subjects = (copy.subjects || []).map(s => ({ ...s, id: uid() }));
    copy.materials = (copy.materials || []).map(m => ({ ...m, id: uid() }));
    setStudents([...students, copy]);
  };
  const handleSaveStudent = (data) => {
    if (students.find(s => s.id === data.id)) {
      setStudents(students.map(s => s.id === data.id ? data : s));
    } else {
      setStudents([...students, data]);
      setSelectedId(data.id);
    }
    setShowForm(false);
    setEditingStudent(null);
  };

  const handleBulkImport = (newStudents) => {
    const existingNames = new Set(students.map(s => s.name));
    const toAdd = newStudents
      .filter(s => !existingNames.has(s.name))
      .map(s => ({
        id: uid(),
        name: s.name,
        schoolName: '',
        grade: '',
        parentContact: s.parentContact || '',
        note: '',
        periodDisplay: '',
        subjects: [],
        materials: [],
      }));
    const skipped = newStudents.length - toAdd.length;
    setStudents([...students, ...toAdd]);
    setShowBulkImport(false);
    let msg = `✅ ${toAdd.length}명 추가 완료`;
    if (skipped > 0) msg += `\n(동일 이름 ${skipped}명 건너뜀)`;
    msg += `\n\n각 학생의 과목·수강료는 편집해서 입력해주세요.`;
    alert(msg);
  };

  const handleExportJSON = () => {
    exportJSON(students, settings);
    setBackupReminder(null); // 백업 완료되면 알림 숨김
  };

  const handleBackupNow = () => {
    handleExportJSON();
  };

  const handleSnoozeBackup = () => {
    const snoozeUntil = new Date();
    snoozeUntil.setDate(snoozeUntil.getDate() + 1);
    storage.set('tuition_backup_snooze_until', snoozeUntil.toISOString());
    setBackupReminder(null);
  };

  const handleDismissBackupReminder = () => {
    const snoozeUntil = new Date();
    snoozeUntil.setDate(snoozeUntil.getDate() + 1);
    storage.set('tuition_backup_snooze_until', snoozeUntil.toISOString());
    setBackupReminder(null);
  };

  const handleImportJSON = (file) => {
    importJSON(file, (data) => {
      if (!confirm(`가져올 데이터:\n• 학생 ${data.students.length}명\n• 설정 포함\n\n현재 데이터를 덮어씁니다. 계속하시겠습니까?\n\n💡 먼저 현재 데이터를 백업으로 내보내두는 것을 권장합니다.`)) return;
      setStudents(data.students);
      if (data.settings) setSettings({ ...DEFAULT_SETTINGS, ...data.settings });
      setSelectedId(data.students[0]?.id || null);
      alert(`✅ 복원 완료: 학생 ${data.students.length}명`);
    });
  };

  const handleAdvanceAll = () => {
    const nowYM = (() => { const d = new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`; })();
    const advanced = advanceAllStudents(students, settings.holidays, nowYM);
    const changes = [];
    students.forEach((orig, i) => {
      const nw = advanced[i];
      (orig.subjects || []).forEach((s, j) => {
        const ns = nw.subjects?.[j];
        if (ns && s.startDate !== ns.startDate) {
          changes.push(`${orig.name} ${s.name}: ${s.startDate} → ${ns.startDate}`);
        }
      });
    });
    if (changes.length === 0) {
      alert('변경할 학생이 없습니다. (모든 과목의 시작일 정보가 없거나 계산 불가)');
      return;
    }
    const preview = changes.slice(0, 8).join('\n') + (changes.length > 8 ? `\n\n... 외 ${changes.length - 8}건` : '');
    if (!confirm(`${changes.length}건의 시작일을 다음 주기로 이동합니다.\n\n미리보기:\n${preview}\n\n✅ 이동 전 현재 주기는 자동으로 이력에 저장됩니다.\n\n진행하시겠습니까?\n\n💡 되돌릴 수 없으니 먼저 백업을 권장합니다.`)) return;
    setStudents(advanced);
    alert(`✅ ${changes.length}건 업데이트 완료\n각 학생의 지난 주기가 이력에 저장되었습니다.`);
  };
  
  const handleAdvanceOne = (studentId) => {
    const target = students.find(s => s.id === studentId);
    if (!target) return;
    
    if (target.isWithdrawn) {
      alert('퇴원 학생은 다음 주기로 이동할 수 없습니다.');
      return;
    }
    if (target.isSuspended) {
      alert('휴원 학생은 다음 주기로 이동할 수 없습니다. 복귀 후 휴원 해제 후 진행해주세요.');
      return;
    }
    
    const nowYM = (() => { const d = new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`; })();
    const advanced = advanceOneStudent(target, settings.holidays, nowYM);
    
    // 변경 내역 미리보기 생성
    const changes = [];
    if (target.isMonthly) {
      if (target.monthlyYearMonth !== advanced.monthlyYearMonth) {
        changes.push(`${target.name}: ${target.monthlyYearMonth || '미설정'} → ${advanced.monthlyYearMonth} (월정액)`);
      }
    } else {
      (target.subjects || []).forEach((s, j) => {
        const ns = advanced.subjects?.[j];
        if (ns && s.startDate !== ns.startDate) {
          changes.push(`${s.name}: ${s.startDate} → ${ns.startDate}`);
        }
      });
    }
    
    if (changes.length === 0) {
      alert(`${target.name} 학생의 시작일/대상월 정보가 없거나 계산할 수 없습니다.`);
      return;
    }
    
    const preview = changes.join('\n');
    const msg = `▶ ${target.name} 학생을 다음 주기로 이동합니다.\n\n미리보기:\n${preview}\n\n✅ 이동 전 현재 주기는 자동으로 이력에 저장됩니다.\n\n진행하시겠습니까?\n\n💡 되돌릴 수 없으니 신중히 확인해주세요.`;
    
    if (!confirm(msg)) return;
    
    setStudents(students.map(s => s.id === studentId ? advanced : s));
    alert(`✅ ${target.name} 학생이 다음 주기로 이동되었습니다.`);
  };

  return (
    <div className="min-h-screen">
      {/* 상단 헤더 */}
      <header className="invoice-navy text-white shadow-lg no-print">
        <div className="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between flex-wrap gap-2">
          <div>
            <div className="invoice-gold-text text-[10px] tracking-[0.25em] font-semibold">
              {settings.academyNameEn}
            </div>
            <h1 className="text-lg font-bold">{settings.academyName} · 수강료 안내 생성기</h1>
          </div>
          <div className="flex items-center gap-3">
            <button
              onClick={() => setPrivacyMode(!privacyMode)}
              className={`px-3 py-1.5 rounded-full text-xs font-semibold transition flex items-center gap-1.5 ${privacyMode ? 'bg-rose-500 text-white' : 'bg-white/15 text-white/90 hover:bg-white/25'}`}
              title={privacyMode ? '프라이버시 모드 ON - 학생수·매출 숨김 (클릭하면 해제)' : '프라이버시 모드 OFF - 정보 표시 중 (클릭하면 숨김)'}
            >
              {privacyMode ? '🔒 비공개 모드' : '🔓 공개 모드'}
            </button>
            <div className="text-xs invoice-gold-text">
              {privacyMode ? '학생 관리 중' : `학생 ${students.length}명 관리 중`}
            </div>
          </div>
        </div>
        <nav className="max-w-7xl mx-auto px-4 flex gap-1">
          {[
            { id: 'invoices', label: '📋 수강료 안내문' },
            { id: 'students', label: '👥 학생 관리' },
            { id: 'payments', label: '💰 납부 현황' },
            { id: 'reports', label: '📊 통계·리포트' },
            { id: 'notice', label: '📢 공지사항' },
            { id: 'policy', label: '📜 수강 원칙' },
            { id: 'settings', label: '⚙️ 학원 정보' },
          ].map(t => (
            <button key={t.id} onClick={() => setTab(t.id)} className={`px-4 py-2 text-sm font-medium rounded-t-md transition ${tab === t.id ? 'bg-gray-100 text-gray-800' : 'text-white/80 hover:bg-white/10'}`}>
              {t.label}
            </button>
          ))}
        </nav>
      </header>

      <main className="max-w-7xl mx-auto p-4">
        {backupReminder && (
          <BackupReminder
            daysSinceBackup={backupReminder.daysSinceBackup}
            onBackupNow={handleBackupNow}
            onSnooze={handleSnoozeBackup}
            onDismiss={handleDismissBackupReminder}
          />
        )}
        {tab === 'students' && (
          <StudentListTab
            students={students}
            onAdd={handleAddStudent}
            onEdit={handleEditStudent}
            onDelete={handleDeleteStudent}
            onDuplicate={handleDuplicateStudent}
            onSelect={(id) => { setSelectedId(id); setTab('invoices'); }}
            selectedId={selectedId}
            onBulkImport={() => setShowBulkImport(true)}
            onExportJSON={handleExportJSON}
            onImportJSON={handleImportJSON}
            onAdvanceAll={handleAdvanceAll}
            onAdvanceOne={handleAdvanceOne}
          />
        )}
        {tab === 'invoices' && (
          <InvoiceTab
            students={students}
            settings={settings}
            selectedId={selectedId}
            onSelect={setSelectedId}
            privacyMode={privacyMode}
          />
        )}
        {tab === 'payments' && (
          <PaymentTab students={students} setStudents={setStudents} privacyMode={privacyMode} />
        )}
        {tab === 'reports' && (
          <ReportsTab students={students} settings={settings} privacyMode={privacyMode} />
        )}
        {tab === 'notice' && (
          <NoticeTab settings={settings} />
        )}
        {tab === 'policy' && (
          <PolicyTab settings={settings} />
        )}
        {tab === 'settings' && (
          <SettingsTab settings={settings} setSettings={setSettings} students={students} />
        )}
      </main>

      {showForm && (
        <StudentForm
          student={editingStudent}
          defaultSettings={settings}
          onSave={handleSaveStudent}
          onCancel={() => { setShowForm(false); setEditingStudent(null); }}
        />
      )}

      {showBulkImport && (
        <ImportStudentsModal
          onImport={handleBulkImport}
          onCancel={() => setShowBulkImport(false)}
        />
      )}

      <footer className="no-print py-4 text-center text-xs text-gray-400">
        모든 데이터는 이 브라우저에 자동 저장됩니다 · localStorage
      </footer>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
