function InvoiceTab({ students, settings, selectedId, onSelect }) {
  const invoiceRef = useRef(null);
  const currentCalRef = useRef(null);
  const planCalRef = useRef(null);

  const bulkInvoiceRef = useRef(null);
  const bulkCurrentRef = useRef(null);
  const bulkPlanRef = useRef(null);
  const bulkResolveRef = useRef(null);

  const [exportingType, setExportingType] = useState(null);
  const [activeView, setActiveView] = useState('invoice');
  const [bulkExporting, setBulkExporting] = useState(false);
  const [bulkProgress, setBulkProgress] = useState({ current: 0, total: 0, name: '', step: '' });
  const [bulkCurrentStudent, setBulkCurrentStudent] = useState(null);
  // 선택된 과목 ID 집합 (학생 변경시 전체 선택으로 초기화)
  const [selectedSubjectIds, setSelectedSubjectIds] = useState(null);
  // 교재비도 과목별로 필터링할지 (기본: 청구 과목명과 관련된 교재만 포함)
  const [filterMaterials, setFilterMaterials] = useState(true);

  const originalStudent = students.find(s => s.id === selectedId);

  // 학생이 바뀌면 모든 과목 선택으로 초기화
  useEffect(() => {
    if (originalStudent) {
      setSelectedSubjectIds(new Set((originalStudent.subjects || []).map(s => s.id)));
    } else {
      setSelectedSubjectIds(null);
    }
  }, [selectedId]);

  // 선택된 과목만 포함된 가상 학생 객체 생성
  const buildFilteredStudent = (src, selectedIds) => {
    if (!src) return null;
    if (!selectedIds || selectedIds.size === (src.subjects || []).length) {
      return src; // 전체 선택이면 원본 그대로
    }
    const filteredSubjects = (src.subjects || []).filter(sub => selectedIds.has(sub.id));
    const selectedSubjectNames = new Set(filteredSubjects.map(s => s.name));
    // 교재비도 선택된 과목명과 관련된 것만 (이름에 과목명 포함된 것)
    let filteredMaterials = src.materials || [];
    if (filterMaterials) {
      filteredMaterials = filteredMaterials.filter(m => {
        if (!m.label) return false;
        // 선택된 과목명 중 하나라도 교재비 라벨에 포함되면 유지
        for (const name of selectedSubjectNames) {
          if (m.label.includes(name)) return true;
        }
        return false;
      });
    }
    return {
      ...src,
      subjects: filteredSubjects,
      materials: filteredMaterials,
    };
  };

  const student = buildFilteredStudent(originalStudent, selectedSubjectIds);

  // 선택된 과목명 (파일명용)
  const selectedSubjectNamesStr = (() => {
    if (!originalStudent || !selectedSubjectIds) return '';
    const allSubjects = originalStudent.subjects || [];
    if (selectedSubjectIds.size === allSubjects.length) return '';
    return allSubjects
      .filter(s => selectedSubjectIds.has(s.id))
      .map(s => s.name)
      .join('+');
  })();

  const buildFilename = (prefix) => {
    if (!originalStudent) return prefix;
    if (selectedSubjectNamesStr) {
      return `${prefix}_${originalStudent.name}_${selectedSubjectNamesStr}`;
    }
    return `${prefix}_${originalStudent.name}`;
  };

  const toggleSubject = (subjectId) => {
    if (!selectedSubjectIds) return;
    const newSet = new Set(selectedSubjectIds);
    if (newSet.has(subjectId)) newSet.delete(subjectId);
    else newSet.add(subjectId);
    setSelectedSubjectIds(newSet);
  };

  const selectAllSubjects = () => {
    if (!originalStudent) return;
    setSelectedSubjectIds(new Set((originalStudent.subjects || []).map(s => s.id)));
  };

  const exportSingle = async (ref, filename, bg) => {
    if (!ref.current || !student) return;
    setExportingType(filename);
    try {
      const el = ref.current;
      const w = el.offsetWidth;
      const h = el.offsetHeight;
      
      let dataUrl;
      // modern-screenshot 우선 시도 (한글 렌더링 훨씬 정확)
      if (window.modernScreenshot && window.modernScreenshot.domToPng) {
        dataUrl = await window.modernScreenshot.domToPng(el, {
          scale: 2,
          backgroundColor: bg,
          width: w,
          height: h,
          style: { transformOrigin: 'top left' },
        });
      } else {
        // 폴백: html2canvas
        const canvas = await html2canvas(el, {
          scale: 2,
          backgroundColor: bg,
          logging: false,
          width: w,
          height: h,
          windowWidth: w,
          windowHeight: h,
        });
        dataUrl = canvas.toDataURL('image/png');
      }
      
      const link = document.createElement('a');
      link.download = `${buildFilename(filename)}.png`;
      link.href = dataUrl;
      link.click();
    } catch (e) {
      alert('이미지 저장 중 오류: ' + e.message);
    }
    setExportingType(null);
  };

  // 📄 PDF 저장: 브라우저 네이티브 인쇄 사용 (완벽한 한글 렌더링)
  const exportPDF = (ref) => {
    if (!ref.current) return;
    
    const el = ref.current;
    
    // 원래 문서 타이틀 저장 (PDF 파일명으로 사용됨)
    const originalTitle = document.title;
    const studentName = student?.name || '학생';
    const cycleLabel = (() => {
      try { return new Date().toISOString().slice(0, 7).replace('-', '년') + '월'; }
      catch { return ''; }
    })();
    document.title = `${studentName}_수강료안내_${cycleLabel}`;
    
    // print-target 클래스 부여
    el.classList.add('print-target');
    
    // 인쇄 다이얼로그 열기
    setTimeout(() => {
      window.print();
      
      // 인쇄 다이얼로그 닫힌 후 정리
      setTimeout(() => {
        el.classList.remove('print-target');
        document.title = originalTitle;
      }, 500);
    }, 100);
  };

  useEffect(() => {
    if (!bulkCurrentStudent) return;
    const t = setTimeout(async () => {
      const results = { invoice: null, current: null, plan: null };
      
      const captureWith = async (el, bg) => {
        const w = el.offsetWidth, h = el.offsetHeight;
        
        // modern-screenshot 우선 시도
        if (window.modernScreenshot && window.modernScreenshot.domToBlob) {
          return await window.modernScreenshot.domToBlob(el, {
            scale: 2,
            backgroundColor: bg,
            width: w,
            height: h,
            style: { transformOrigin: 'top left' },
          });
        }
        
        // 폴백: html2canvas
        const canvas = await html2canvas(el, {
          scale: 2, backgroundColor: bg, logging: false,
          width: w, height: h, windowWidth: w, windowHeight: h,
        });
        return await new Promise(r => canvas.toBlob(r, 'image/png'));
      };
      
      try {
        if (bulkInvoiceRef.current) {
          results.invoice = await captureWith(bulkInvoiceRef.current, '#1a2344');
        }
        if (bulkCurrentRef.current) {
          results.current = await captureWith(bulkCurrentRef.current, '#ffffff');
        }
        if (bulkPlanRef.current) {
          results.plan = await captureWith(bulkPlanRef.current, '#ffffff');
        }
      } catch (e) {
        console.error('Bulk capture error:', e);
      }
      if (bulkResolveRef.current) bulkResolveRef.current(results);
    }, 300);
    return () => clearTimeout(t);
  }, [bulkCurrentStudent]);

  const captureStudent = (s) => new Promise((resolve) => {
    bulkResolveRef.current = resolve;
    setBulkCurrentStudent(s);
  });

  const exportAllZip = async () => {
    const valid = students.filter(s => (s.subjects || []).length > 0);
    if (valid.length === 0) {
      alert('과목이 입력된 학생이 없습니다. 먼저 학생 정보를 입력해주세요.');
      return;
    }
    const skipped = students.length - valid.length;
    const msg = `${valid.length}명의 수강료 안내문 + 진행/계획 캘린더를 모두 저장합니다.` +
                (skipped > 0 ? `\n(과목 미입력 ${skipped}명 제외)` : '') +
                `\n학생당 폴더 1개, 3장씩 = 총 ${valid.length * 3}장 이미지\n\n시간이 꽤 걸릴 수 있습니다. 진행하시겠습니까?`;
    if (!confirm(msg)) return;

    setBulkExporting(true);
    setBulkProgress({ current: 0, total: valid.length, name: '', step: '' });
    const zip = new JSZip();

    for (let i = 0; i < valid.length; i++) {
      const s = valid[i];
      setBulkProgress({ current: i + 1, total: valid.length, name: s.name, step: '' });
      const results = await captureStudent(s);
      const folder = zip.folder(s.name);
      if (results.invoice) folder.file(`1_수강료안내_${s.name}.png`, results.invoice);
      if (results.current) folder.file(`2_진행캘린더_${s.name}.png`, results.current);
      if (results.plan) folder.file(`3_계획캘린더_${s.name}.png`, results.plan);
    }

    setBulkCurrentStudent(null);

    try {
      setBulkProgress(p => ({ ...p, step: 'ZIP 파일 생성 중...' }));
      const zipBlob = await zip.generateAsync({ type: 'blob' });
      const url = URL.createObjectURL(zipBlob);
      const a = document.createElement('a');
      const date = new Date().toISOString().split('T')[0];
      a.download = `수강료안내_전체_${date}.zip`;
      a.href = url;
      a.click();
      URL.revokeObjectURL(url);
    } catch (e) {
      alert('ZIP 생성 실패: ' + e.message);
    }
    setBulkExporting(false);
  };

  return (
    <div className="grid grid-cols-1 lg:grid-cols-[280px_1fr] gap-4">
      {/* 학생 선택 */}
      <div className="bg-white rounded-lg border p-3 lg:max-h-[85vh] lg:overflow-y-auto">
        <h3 className="font-bold text-sm mb-2 text-gray-700">학생 ({students.length}명)</h3>
        <button
          onClick={exportAllZip}
          disabled={bulkExporting || students.length === 0}
          className="w-full mb-3 px-3 py-2 bg-green-600 text-white rounded text-xs font-semibold disabled:bg-gray-300"
        >
          {bulkExporting ? `생성 중... ${bulkProgress.current}/${bulkProgress.total}` : '📦 전체 ZIP 일괄 저장'}
        </button>
        {bulkExporting && (
          <div className="text-[10px] text-gray-500 text-center mb-2">
            <div>{bulkProgress.name}</div>
            {bulkProgress.step && <div className="text-blue-600 font-semibold">{bulkProgress.step}</div>}
            <div className="mt-1 h-1 bg-gray-200 rounded overflow-hidden">

function SettingsTab({ settings, setSettings, students }) {

  const updateList = (k, idx, v) => {
    const arr = [...(settings[k] || [])];
    arr[idx] = v;
    update(k, arr);
  };
  const addToList = (k, defaultV = '') => update(k, [...(settings[k] || []), defaultV]);
  const removeFromList = (k, idx) => update(k, (settings[k] || []).filter((_, i) => i !== idx));

  return (
    <div className="max-w-3xl space-y-4">
      <Section title="학원 기본 정보">
        <Row label="학원명 (한글)"><input type="text" value={settings.academyName} onChange={(e) => update('academyName', e.target.value)} className="input" /></Row>
        <Row label="학원명 (영문)"><input type="text" value={settings.academyNameEn} onChange={(e) => update('academyNameEn', e.target.value)} className="input" /></Row>
        <Row label="학원 대표 전화"><input type="text" value={settings.academyPhone} onChange={(e) => update('academyPhone', e.target.value)} className="input" /></Row>
        <Row label="원장 직통 전화"><input type="text" value={settings.directorPhone} onChange={(e) => update('directorPhone', e.target.value)} className="input" /></Row>
      </Section>

      <Section title="헤더 / 인사말 / 푸터 문구">
        <Row label="헤더 제목 1"><input type="text" value={settings.headerTitle1} onChange={(e) => update('headerTitle1', e.target.value)} className="input" /></Row>
        <Row label="헤더 제목 2 (금색 강조)"><input type="text" value={settings.headerTitle2} onChange={(e) => update('headerTitle2', e.target.value)} className="input" /></Row>
        <Row label="인사말 1 ({학원명} 자동 치환)"><input type="text" value={settings.greetingLine1} onChange={(e) => update('greetingLine1', e.target.value)} className="input" /></Row>
        <Row label="인사말 2"><input type="text" value={settings.greetingLine2} onChange={(e) => update('greetingLine2', e.target.value)} className="input" /></Row>
        <Row label="인사말 3"><input type="text" value={settings.greetingLine3} onChange={(e) => update('greetingLine3', e.target.value)} className="input" /></Row>
        <Row label="푸터 문구 1"><input type="text" value={settings.footerLine1} onChange={(e) => update('footerLine1', e.target.value)} className="input" /></Row>
        <Row label="푸터 문구 2"><input type="text" value={settings.footerLine2} onChange={(e) => update('footerLine2', e.target.value)} className="input" /></Row>
      </Section>

      <Section title="교습비 카드 결제 안내">
        {(settings.tuitionCardItems || []).map((it, i) => (
          <div key={i} className="flex gap-2"><input type="text" value={it} onChange={(e) => updateList('tuitionCardItems', i, e.target.value)} className="input flex-1" /><button onClick={() => removeFromList('tuitionCardItems', i)} className="px-2 text-red-500">×</button></div>
        ))}

      </Section>

      <Section title="교습비 현금 이체 안내">

        <TuitionPresetsManager

        <HolidaysManager holidays={settings.holidays || []} onChange={(hs) => update('holidays', hs)} />
      </Section>

      <Section title="기타">
        <Row label="컨텐츠비 포함 항목 문구"><input type="text" value={settings.contentsLabel} onChange={(e) => update('contentsLabel', e.target.value)} className="input" /></Row>

function PaymentTab({ students, setStudents }) {
  const [yearMonth, setYearMonth] = useState(() => {
    const d = new Date();
    return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
  });
  const [filter, setFilter] = useState('all');
  const [search, setSearch] = useState('');

  const getPayment = (s) => (s.payments && s.payments[yearMonth]) || { status: 'pending', paidDate: '', note: '' };
  const getAmount = (s) => (s.subjects || []).reduce((a, x) => a + (x.tuition || 0), 0) + (s.materials || []).reduce((a, x) => a + (x.amount || 0), 0);

  const updatePayment = (studentId, patch) => {
    setStudents(students.map(s => {
      if (s.id !== studentId) return s;
      const current = getPayment(s);
      return {
        ...s,
        payments: {
          ...(s.payments || {}),
          [yearMonth]: { ...current, ...patch },
        },
      };
    }));
  };

  const togglePaid = (s) => {
    const current = getPayment(s);
    const isPaid = current.status === 'paid';
    updatePayment(s.id, {
      status: isPaid ? 'pending' : 'paid',
      paidDate: isPaid ? '' : formatDateStr(new Date()),
    });
  };

  const markAllPaid = () => {
    if (!confirm(`${yearMonth} 기준으로 표시된 학생 전원을 납부완료로 변경합니다. 진행하시겠습니까?`)) return;
    const today = formatDateStr(new Date());
    setStudents(students.map(s => {
      if (!filtered.some(f => f.id === s.id)) return s;
      return {
        ...s,
        payments: {
          ...(s.payments || {}),
          [yearMonth]: { status: 'paid', paidDate: today, note: getPayment(s).note || '' },
        },
      };
    }));
  };

  const filtered = students.filter(s => {
    if (search && !s.name.includes(search)) return false;
    const p = getPayment(s);
    if (filter === 'paid') return p.status === 'paid';
    if (filter === 'unpaid') return p.status !== 'paid';
    return true;
  });

  const paidCount = students.filter(s => getPayment(s).status === 'paid').length;
  const unpaidCount = students.length - paidCount;
  const totalAmount = students.reduce((sum, s) => sum + getAmount(s), 0);
  const paidAmount = students.filter(s => getPayment(s).status === 'paid').reduce((sum, s) => sum + getAmount(s), 0);
  const unpaidAmount = totalAmount - paidAmount;

  const copyUnpaidList = () => {
    const unpaid = students.filter(s => getPayment(s).status !== 'paid');
    if (unpaid.length === 0) { alert('미납자 없음'); return; }
    const text = unpaid.map(s => `${s.name} - ${fmtWon(getAmount(s))}`).join('\n');
    if (navigator.clipboard) {
      navigator.clipboard.writeText(text).then(() => alert(`미납자 ${unpaid.length}명 목록이 클립보드에 복사되었습니다`));
    } else {
      alert(text);
    }
  };

  return (
    <div className="space-y-4">
      {/* 필터·검색 */}
      <div className="bg-white border rounded-lg p-4 flex gap-3 items-end flex-wrap">
        <div>
          <label className="block text-[11px] text-gray-500 mb-0.5">납부 대상 월</label>
          <input type="month" value={yearMonth} onChange={(e) => setYearMonth(e.target.value)} className="px-3 py-1.5 border rounded text-sm" />
        </div>
        <div>
          <label className="block text-[11px] text-gray-500 mb-0.5">검색</label>
          <input type="text" value={search} onChange={(e) => setSearch(e.target.value)} placeholder="학생 이름..." className="px-3 py-1.5 border rounded text-sm" />
        </div>
        <div>
          <label className="block text-[11px] text-gray-500 mb-0.5">필터</label>
          <div className="flex gap-1">
            {[['all', '전체'], ['paid', '✓ 납부완료'], ['unpaid', '⚠ 미납']].map(([k, l]) => (
              <button key={k} onClick={() => setFilter(k)} className={`px-3 py-1.5 rounded text-xs font-semibold transition ${filter === k ? 'invoice-navy text-white' : 'bg-gray-100 text-gray-700 hover:bg-gray-200'}`}>
                {l}
              </button>
            ))}
          </div>
        </div>
        <div className="flex-1"></div>
        <div className="flex gap-1">
          <button onClick={copyUnpaidList} className="px-3 py-1.5 bg-orange-500 text-white rounded text-xs font-semibold hover:bg-orange-600">📋 미납자 목록 복사</button>
          <button onClick={markAllPaid} className="px-3 py-1.5 bg-green-600 text-white rounded text-xs font-semibold hover:bg-green-700">✓ 표시된 전원 납부완료</button>
        </div>
      </div>

      {/* 통계 */}
      <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
        <StatCard title="전체 학생" value={`${students.length}명`} color="blue" />
        <StatCard title="납부 완료" value={`${paidCount}명 · ${fmtWon(paidAmount)}`} color="green" />
        <StatCard title="미납" value={`${unpaidCount}명 · ${fmtWon(unpaidAmount)}`} color="red" />
        <StatCard title="납부율" value={`${students.length === 0 ? 0 : Math.round((paidCount / students.length) * 100)}%`} color="orange" />
      </div>

      {/* 학생 목록 */}
      <div className="bg-white rounded-lg border overflow-hidden">
        <table className="w-full text-sm">
          <thead className="bg-gray-50 border-b">
            <tr>
              <th className="px-3 py-2 text-left font-semibold text-gray-700">학생</th>
              <th className="px-3 py-2 text-right font-semibold text-gray-700">납부액</th>
              <th className="px-3 py-2 text-center font-semibold text-gray-700">상태</th>
              <th className="px-3 py-2 text-center font-semibold text-gray-700">납부일</th>
              <th className="px-3 py-2 text-left font-semibold text-gray-700">메모</th>
            </tr>
          </thead>
          <tbody>
            {filtered.length === 0 && (
              <tr><td colSpan="5" className="px-3 py-8 text-center text-gray-400">해당 조건의 학생이 없습니다</td></tr>
            )}
            {filtered.map((s) => {
              const p = getPayment(s);
              const amount = getAmount(s);
              const isPaid = p.status === 'paid';
              return (
                <tr key={s.id} className={`border-b ${isPaid ? 'bg-green-50/40' : ''}`}>
                  <td className="px-3 py-2 font-semibold text-gray-800">{s.name}</td>
                  <td className="px-3 py-2 text-right font-medium text-gray-700">{fmtWon(amount)}</td>
                  <td className="px-3 py-2 text-center">
                    <button onClick={() => togglePaid(s)} className={`px-3 py-1 rounded text-xs font-bold transition ${isPaid ? 'bg-green-600 text-white' : 'bg-red-100 text-red-700 border border-red-300 hover:bg-red-200'}`}>
                      {isPaid ? '✓ 납부완료' : '미납'}
                    </button>
                  </td>
                  <td className="px-3 py-2 text-center">
                    <input type="date" value={p.paidDate || ''} onChange={(e) => updatePayment(s.id, { paidDate: e.target.value })} className="text-xs px-1.5 py-0.5 border rounded" />
                  </td>
                  <td className="px-3 py-2">
                    <input type="text" value={p.note || ''} onChange={(e) => updatePayment(s.id, { note: e.target.value })} placeholder="메모 (선택)" className="w-full px-2 py-1 text-xs border rounded" />
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════
//  8. 메인 앱
// ═══════════════════════════════════════════════════

function App() {
  const [tab, setTab] = useState('invoices');
  const [students, setStudents] = useState(() => {
    try {
      const s = storage.get('tuition_students');
      if (s) return JSON.parse(s);
    } catch {}
    return [SAMPLE_STUDENT];
  });
  const [settings, setSettings] = useState(() => {
    try {
      const s = storage.get('tuition_settings');
      if (s) return { ...DEFAULT_SETTINGS, ...JSON.parse(s) };
    } catch {}
    return DEFAULT_SETTINGS;
  });
  const [selectedId, setSelectedId] = useState(students[0]?.id || null);
  const [editingStudent, setEditingStudent] = useState(null);
  const [showForm, setShowForm] = useState(false);
  const [showBulkImport, setShowBulkImport] = useState(false);
  const [backupReminder, setBackupReminder] = useState(null); // null | {daysSinceBackup}

  useEffect(() => { storage.set('tuition_students', JSON.stringify(students)); }, [students]);
  useEffect(() => { storage.set('tuition_settings', JSON.stringify(settings)); }, [settings]);

  // 자동 백업 알림 체크 (앱 시작 시 1회)
  useEffect(() => {
    // 학생 데이터 없으면 알림 안 띄움
    if (students.length === 0) return;

    // 스누즈 확인
    const snoozeUntil = storage.get('tuition_backup_snooze_until');
    if (snoozeUntil && new Date(snoozeUntil) > new Date()) return;

    const lastBackup = storage.get('tuition_last_backup_at');
    if (!lastBackup) {
      // 한 번도 백업 안 했는데 학생은 있음 → 알림
      setBackupReminder({ daysSinceBackup: null });
      return;
    }

    const daysAgo = Math.floor((Date.now() - new Date(lastBackup).getTime()) / (1000 * 60 * 60 * 24));
    if (daysAgo >= 7) {
      setBackupReminder({ daysSinceBackup: daysAgo });
    }
  }, []); // 앱 마운트 시 1회만 실행

  const handleAddStudent = () => { setEditingStudent(null); setShowForm(true); };
  const handleEditStudent = (id) => { setEditingStudent(students.find(s => s.id === id)); setShowForm(true); };
  const handleDeleteStudent = (id) => {
    setStudents(students.filter(s => s.id !== id));
    if (selectedId === id) setSelectedId(students.find(s => s.id !== id)?.id || null);
  };
  const handleDuplicateStudent = (id) => {
    const orig = students.find(s => s.id === id);
    if (!orig) return;
    const copy = JSON.parse(JSON.stringify(orig));
    copy.id = uid();
    copy.name = orig.name + ' (복사)';
    copy.subjects = (copy.subjects || []).map(s => ({ ...s, id: uid() }));
    copy.materials = (copy.materials || []).map(m => ({ ...m, id: uid() }));
    setStudents([...students, copy]);
  };
  const handleSaveStudent = (data) => {
    if (students.find(s => s.id === data.id)) {
      setStudents(students.map(s => s.id === data.id ? data : s));
    } else {
      setStudents([...students, data]);
      setSelectedId(data.id);
    }
    setShowForm(false);
    setEditingStudent(null);
  };

  const handleBulkImport = (newStudents) => {
    const existingNames = new Set(students.map(s => s.name));
    const toAdd = newStudents
      .filter(s => !existingNames.has(s.name))
      .map(s => ({
        id: uid(),
        name: s.name,
        schoolName: '',
        grade: '',
        parentContact: s.parentContact || '',
        note: '',
        periodDisplay: '',
        subjects: [],
        materials: [],
      }));
    const skipped = newStudents.length - toAdd.length;
    setStudents([...students, ...toAdd]);
    setShowBulkImport(false);
    let msg = `✅ ${toAdd.length}명 추가 완료`;
    if (skipped > 0) msg += `\n(동일 이름 ${skipped}명 건너뜀)`;
    msg += `\n\n각 학생의 과목·수강료는 편집해서 입력해주세요.`;
    alert(msg);
  };

  const handleExportJSON = () => {
    exportJSON(students, settings);
    setBackupReminder(null); // 백업 완료되면 알림 숨김
  };

  const handleBackupNow = () => {
    handleExportJSON();
  };

  const handleSnoozeBackup = () => {
    const snoozeUntil = new Date();
    snoozeUntil.setDate(snoozeUntil.getDate() + 1);
    storage.set('tuition_backup_snooze_until', snoozeUntil.toISOString());
    setBackupReminder(null);
  };

  const handleDismissBackupReminder = () => {
    const snoozeUntil = new Date();
    snoozeUntil.setDate(snoozeUntil.getDate() + 1);
    storage.set('tuition_backup_snooze_until', snoozeUntil.toISOString());
    setBackupReminder(null);
  };

  const handleImportJSON = (file) => {
    importJSON(file, (data) => {
      if (!confirm(`가져올 데이터:\n• 학생 ${data.students.length}명\n• 설정 포함\n\n현재 데이터를 덮어씁니다. 계속하시겠습니까?\n\n💡 먼저 현재 데이터를 백업으로 내보내두는 것을 권장합니다.`)) return;
      setStudents(data.students);
      if (data.settings) setSettings({ ...DEFAULT_SETTINGS, ...data.settings });
      setSelectedId(data.students[0]?.id || null);
      alert(`✅ 복원 완료: 학생 ${data.students.length}명`);
    });
  };

  const handleAdvanceAll = () => {
    const advanced = advanceAllStudents(students, settings.holidays);
    const changes = [];
    students.forEach((orig, i) => {
      const nw = advanced[i];
      (orig.subjects || []).forEach((s, j) => {
        const ns = nw.subjects?.[j];
        if (ns && s.startDate !== ns.startDate) {
          changes.push(`${orig.name} ${s.name}: ${s.startDate} → ${ns.startDate}`);
        }
      });
    });
    if (changes.length === 0) {
      alert('변경할 학생이 없습니다. (모든 과목의 시작일 정보가 없거나 계산 불가)');
      return;
    }
    const preview = changes.slice(0, 8).join('\n') + (changes.length > 8 ? `\n\n... 외 ${changes.length - 8}건` : '');
    if (!confirm(`${changes.length}건의 시작일을 다음 주기로 이동합니다.\n\n미리보기:\n${preview}\n\n진행하시겠습니까?\n\n💡 되돌릴 수 없으니 먼저 백업을 권장합니다.`)) return;
    setStudents(advanced);
    alert(`✅ ${changes.length}건 업데이트 완료`);
  };

  return (
    <div className="min-h-screen">
      {/* 상단 헤더 */}
      <header className="invoice-navy text-white shadow-lg no-print">
        <div className="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between flex-wrap gap-2">
          <div>
            <div className="invoice-gold-text text-[10px] tracking-[0.25em] font-semibold">
              {settings.academyNameEn}
            </div>
            <h1 className="text-lg font-bold">{settings.academyName} · 수강료 안내 생성기</h1>
          </div>
          <div className="text-xs invoice-gold-text">학생 {students.length}명 관리 중</div>
        </div>
        <nav className="max-w-7xl mx-auto px-4 flex gap-1">
          {[
            { id: 'invoices', label: '📋 수강료 안내문' },
            { id: 'students', label: '👥 학생 관리' },
            { id: 'payments', label: '💰 납부 현황' },
            { id: 'settings', label: '⚙️ 학원 정보' },
          ].map(t => (
            <button key={t.id} onClick={() => setTab(t.id)} className={`px-4 py-2 text-sm font-medium rounded-t-md transition ${tab === t.id ? 'bg-gray-100 text-gray-800' : 'text-white/80 hover:bg-white/10'}`}>
              {t.label}
            </button>
          ))}
        </nav>
      </header>

      <main className="max-w-7xl mx-auto p-4">
        {backupReminder && (
          <BackupReminder
            daysSinceBackup={backupReminder.daysSinceBackup}
            onBackupNow={handleBackupNow}
            onSnooze={handleSnoozeBackup}
            onDismiss={handleDismissBackupReminder}
          />
        )}
        {tab === 'students' && (
          <StudentListTab
            students={students}
            onAdd={handleAddStudent}
            onEdit={handleEditStudent}
            onDelete={handleDeleteStudent}
            onDuplicate={handleDuplicateStudent}
            onSelect={(id) => { setSelectedId(id); setTab('invoices'); }}
            selectedId={selectedId}
            onBulkImport={() => setShowBulkImport(true)}
            onExportJSON={handleExportJSON}
            onImportJSON={handleImportJSON}
            onAdvanceAll={handleAdvanceAll}
          />
        )}
        {tab === 'invoices' && (
          <InvoiceTab
            students={students}
            settings={settings}
            selectedId={selectedId}
            onSelect={setSelectedId}
          />
        )}
        {tab === 'payments' && (
          <PaymentTab students={students} setStudents={setStudents} />
        )}
        {tab === 'settings' && (
          <SettingsTab settings={settings} setSettings={setSettings} students={students} />
        )}
      </main>

      {showForm && (
        <StudentForm
          student={editingStudent}
          defaultSettings={settings}
          onSave={handleSaveStudent}
          onCancel={() => { setShowForm(false); setEditingStudent(null); }}
        />
      )}

      {showBulkImport && (
        <ImportStudentsModal
          onImport={handleBulkImport}
          onCancel={() => setShowBulkImport(false)}
        />
      )}

      <footer className="no-print py-4 text-center text-xs text-gray-400">
        모든 데이터는 이 브라우저에 자동 저장됩니다 · localStorage
      </footer>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
